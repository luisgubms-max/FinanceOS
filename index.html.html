<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinanceOS — Gestão Financeira Pessoal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020817;--bg1:#0a0f1e;--bg2:#0f172a;--bg3:#1e293b;--bg4:#334155;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--text4:#475569;
  --green:#10b981;--cyan:#06b6d4;--red:#ef4444;--amber:#f59e0b;
  --indigo:#6366f1;--purple:#8b5cf6;--blue:#3b82f6;--pink:#ec4899;
  --border:#1e293b;--border2:#334155;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;font-size:14px;line-height:1.5}
h1,h2,h3,h4{font-family:'Syne',sans-serif}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
input,select,textarea{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color 0.2s}
input:focus,select:focus,textarea:focus{border-color:var(--green)}
input[type=color]{padding:2px;width:36px;height:34px;cursor:pointer;border-radius:6px}
input[type=date]{color-scheme:dark}
input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--green)}
button{font-family:inherit;cursor:pointer;transition:all 0.15s}
textarea{resize:vertical;min-height:80px;line-height:1.6}
@keyframes slideIn{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideDown{from{transform:translateY(-10px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.fade{animation:fadeIn 0.25s ease}
#app{display:flex;flex-direction:column;min-height:100vh}

/* NAV */
#nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:58px;background:var(--bg1);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;gap:12px}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--green),var(--cyan));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;background:linear-gradient(135deg,var(--green),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tabs{display:flex;gap:2px}
.tab-btn{background:transparent;border:1px solid transparent;border-radius:8px;padding:6px 13px;color:var(--text3);font-size:13px;font-weight:400;display:flex;align-items:center;gap:6px}
.tab-btn:hover{color:var(--text2);background:var(--bg3)}
.tab-btn.active{background:var(--bg3);border-color:var(--border2);color:var(--text);font-weight:600}
.tab-dot{width:6px;height:6px;background:var(--purple);border-radius:50%}
.tab-badge{background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:2px}
.month-sel{display:flex;align-items:center;gap:8px;flex-shrink:0}
.month-sel span{font-size:13px;color:var(--text3)}

/* MAIN */
#main{max-width:1380px;margin:0 auto;padding:24px 20px;flex:1;width:100%}
.page-header{margin-bottom:22px}
.page-header h1{font-size:24px;font-weight:800;color:#f1f5f9;margin-bottom:2px}
.page-header p{color:var(--text4);font-size:13px}

/* ALERT BANNER */
.alert-banner{display:flex;align-items:center;gap:12px;padding:12px 18px;border-radius:12px;margin-bottom:18px;animation:slideDown .3s ease}
.alert-banner.red{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3)}
.alert-banner.amber{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25)}
.alert-banner.green{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25)}
.alert-banner-close{margin-left:auto;background:transparent;border:none;color:var(--text3);font-size:18px;line-height:1;padding:2px 6px}

/* IMPORT BANNER */
.import-banner{display:flex;align-items:center;gap:12px;padding:12px 18px;border-radius:12px;margin-bottom:16px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);animation:slideDown .3s ease}

/* METRICS */
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.metric-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.metric-card .label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.metric-card .value{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace}

/* HEALTH CARD */
.health-card{border-radius:14px;padding:18px 22px;margin-bottom:16px;display:flex;align-items:center;gap:18px}
.health-card.green{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25)}
.health-card.amber{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25)}
.health-card.orange{background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.25)}
.health-card.red{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25)}
.health-emoji{font-size:42px;flex-shrink:0}
.health-tips{margin-top:8px;display:flex;flex-direction:column;gap:4px}
.health-tip{font-size:12px;color:var(--text3);display:flex;align-items:flex-start;gap:6px}

/* TODAY CARD */
.today-card{background:linear-gradient(135deg,rgba(16,185,129,.1),rgba(6,182,212,.08));border:1px solid rgba(16,185,129,.2);border-radius:14px;padding:18px 22px;margin-bottom:16px;display:flex;align-items:center;gap:20px}
.today-amount{font-size:36px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--green)}
.today-sub{font-size:13px;color:var(--text3);margin-top:4px}

/* PANEL */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px}
.panel-header{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.panel-header h3{font-size:15px;color:var(--text);font-weight:600}
.panel-header .total{margin-left:auto;font-size:14px;font-weight:700}

/* ITEM ROW */
.item-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bg1)}
.item-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.item-name{flex:1;font-size:14px;color:var(--text)}
.item-sub{font-size:11px;color:var(--text4);background:var(--bg3);padding:2px 7px;border-radius:4px}
.item-val{font-weight:600;font-size:14px;min-width:90px;text-align:right}
.recur-badge{font-size:11px;color:var(--indigo);background:rgba(99,102,241,.12);padding:2px 7px;border-radius:4px}
.icon-btn{background:transparent;border:none;padding:4px 6px;border-radius:6px;font-size:14px;opacity:.7;line-height:1}
.icon-btn:hover{opacity:1;background:var(--bg3)}

/* CONFIRM DELETE */
.confirm-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bg1);animation:fadeIn .2s ease}
.confirm-row span{flex:1;font-size:13px;color:var(--text2)}
.btn-confirm-del{background:var(--red);border:none;border-radius:6px;padding:4px 12px;color:#fff;font-size:12px;font-weight:600}
.btn-confirm-cancel{background:transparent;border:1px solid var(--bg4);border-radius:6px;padding:4px 10px;color:var(--text3);font-size:12px}

/* ADD FORM */
.add-form{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:10px 0}
.add-form input,.add-form select{font-size:13px}
.btn{border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#0ea572}
.btn-ghost{background:transparent;border:1px solid var(--bg4);color:var(--text3);border-radius:8px;padding:7px 12px;font-size:13px}
.btn-ghost:hover{background:var(--bg3);color:var(--text2)}
.btn-purple{background:var(--purple);color:#fff}
.btn-purple:hover{background:#7c3aed}
.btn-amber{background:var(--amber);color:#000}
.btn-red{background:var(--red);color:#fff}

/* CHART TOGGLES */
.chart-toggles{display:flex;gap:4px;margin-left:auto}
.chart-toggle{background:var(--bg3);border:none;border-radius:6px;padding:4px 11px;color:var(--text3);font-size:12px}
.chart-toggle.active{background:var(--green);color:#fff}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}

/* TABLE */
.data-table{width:100%;border-collapse:collapse}
.data-table th{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:10px 14px;border-bottom:1px solid var(--border);text-align:left;font-weight:600}
.data-table td{padding:11px 14px;border-bottom:1px solid var(--bg1);font-size:13px}
.data-table tr:hover td{background:rgba(255,255,255,.02)}

/* BADGE */
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.badge-in{background:rgba(16,185,129,.15);color:var(--green)}
.badge-out{background:rgba(239,68,68,.15);color:var(--red)}

/* PROGRESS */
.progress-bar-track{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:3px;transition:width .5s ease}

/* TOAST */
#toast{position:fixed;bottom:22px;right:22px;background:var(--green);color:#fff;padding:11px 18px;border-radius:10px;font-size:14px;font-weight:500;box-shadow:0 4px 24px rgba(16,185,129,.4);animation:slideIn .3s ease;z-index:9999;display:none}

/* TRIP */
.trip-header{background:linear-gradient(135deg,#1a0533,var(--bg2));border:1px solid #6d28d9;border-radius:14px;padding:16px 22px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}

/* MISC */
.filter-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.empty{text-align:center;padding:50px 20px;color:var(--text4)}
.empty .emoji{font-size:48px;margin-bottom:12px}
.rank-item{margin-bottom:14px}
.rank-item-header{display:flex;justify-content:space-between;margin-bottom:4px;font-size:13px}
.rank-label{color:var(--text3)}
.goals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;margin-bottom:20px}
.goal-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px}
.cart-summary{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-top:1px solid var(--border)}

/* EXPORT DROPDOWN */
.export-wrap{position:relative;display:inline-block}
.export-menu{position:absolute;top:calc(100% + 6px);right:0;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:6px;min-width:170px;z-index:100;animation:slideDown .2s ease;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.export-menu button{display:block;width:100%;text-align:left;background:transparent;border:none;padding:8px 12px;border-radius:7px;color:var(--text2);font-size:13px}
.export-menu button:hover{background:var(--bg3);color:var(--text)}

/* NOTES */
.notes-saved{font-size:11px;color:var(--green);margin-top:6px;height:14px;transition:opacity .3s}

/* ONBOARDING */
#onboarding{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.onboard-box{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:36px 40px;max-width:520px;width:100%;animation:slideIn .4s ease}
.onboard-steps{display:flex;gap:8px;margin-bottom:28px}
.onboard-step{height:4px;flex:1;border-radius:2px;background:var(--bg3);transition:background .3s}
.onboard-step.done{background:var(--green)}
.onboard-step.active{background:var(--cyan)}
.onboard-title{font-size:22px;font-weight:800;margin-bottom:6px}
.onboard-sub{color:var(--text3);font-size:14px;margin-bottom:24px}
.onboard-actions{display:flex;gap:10px;margin-top:24px;justify-content:space-between;align-items:center}

/* ── CALENDAR ── */
.cal-wrap{display:grid;grid-template-columns:1fr 340px;gap:18px}
@media(max-width:1050px){.cal-wrap{grid-template-columns:1fr}}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.cal-nav h2{font-size:20px;font-weight:800;color:var(--text)}
.cal-nav-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:6px 14px;color:var(--text2);font-size:14px}
.cal-nav-btn:hover{background:var(--bg4);color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:6px 0;margin-bottom:4px}
.cal-dow.weekend{color:var(--indigo)}
.cal-cell{background:var(--bg2);border:1px solid var(--border);border-radius:10px;min-height:88px;padding:7px 8px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.cal-cell:hover{border-color:var(--green);background:rgba(16,185,129,.05)}
.cal-cell.today{border-color:var(--green);background:rgba(16,185,129,.07)}
.cal-cell.today .cal-day-num{background:var(--green);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.cal-cell.selected{border-color:var(--cyan);background:rgba(6,182,212,.07)}
.cal-cell.other-month{opacity:.35}
.cal-cell.has-overdue{border-color:rgba(239,68,68,.5)}
.cal-day-num{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:5px;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.cal-cell.weekend-day .cal-day-num{color:var(--indigo)}
.cal-event{font-size:10px;padding:2px 6px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;line-height:1.4}
.cal-event.income{background:rgba(16,185,129,.18);color:#6ee7b7}
.cal-event.expense{background:rgba(239,68,68,.15);color:#fca5a5}
.cal-event.reminder{background:rgba(245,158,11,.15);color:#fcd34d}
.cal-event.bill{background:rgba(239,68,68,.25);color:#f87171}
.cal-event.more{background:var(--bg3);color:var(--text3);font-style:italic}
.cal-day-total{position:absolute;bottom:5px;right:6px;font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace}
/* Day detail panel */
.day-detail{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:18px;position:sticky;top:78px}
.day-detail-header{font-size:18px;font-weight:800;margin-bottom:4px}
.day-detail-sub{font-size:12px;color:var(--text3);margin-bottom:16px}
.day-event-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:6px;cursor:pointer}
.day-event-row:hover{background:var(--bg3)}
.day-event-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.day-event-name{flex:1;font-size:13px;font-weight:500}
.day-event-val{font-size:13px;font-weight:700}
/* Mini add form */
.cal-add-form{background:var(--bg3);border-radius:10px;padding:14px;margin-top:14px}
.cal-add-form h4{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px}
.cal-add-row{display:flex;flex-direction:column;gap:8px}
.cal-add-row input,.cal-add-row select{font-size:13px;width:100%}
/* Summary bar */
.cal-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.cal-summary-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.cal-summary-card .csl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.cal-summary-card .csv{font-size:17px;font-weight:700;font-family:'JetBrains Mono',monospace}
/* Upcoming bills */
.upcoming-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bg1)}
.upcoming-date{min-width:36px;height:36px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;font-weight:700;text-transform:uppercase;line-height:1.2}
.upcoming-date.soon{background:rgba(239,68,68,.15);color:#f87171}
.upcoming-date.ok{background:rgba(16,185,129,.12);color:#6ee7b7}
.upcoming-date.today-due{background:var(--red);color:#fff}
/* PRINT */
@media print{
  #nav,#toast,#onboarding,.no-print{display:none!important}
  body{background:#fff;color:#111}
  #main{max-width:100%;padding:10px}
  .panel,.metric-card,.health-card,.today-card{border:1px solid #ddd;background:#fff;break-inside:avoid}
  .metric-card .value,.item-val,.item-name{color:#111!important}
  .label,.item-sub,.rank-label,.text3{color:#555!important}
  canvas{max-width:100%}
  .two-col{display:block}
  button{display:none}
  .progress-bar-track{border:1px solid #ddd}
  .progress-bar-fill{print-color-adjust:exact;-webkit-print-color-adjust:exact}
}

/* ── AUTH SCREEN ── */
#auth-screen{position:fixed;inset:0;background:var(--bg);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-box{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:40px;max-width:420px;width:100%;animation:slideIn .4s ease}
.auth-logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px}
.auth-logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--green),var(--cyan));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.auth-logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;background:linear-gradient(135deg,var(--green),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.auth-title{font-size:20px;font-weight:800;text-align:center;margin-bottom:4px}
.auth-sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:28px}
.auth-field{margin-bottom:14px}
.auth-field label{display:block;font-size:12px;color:var(--text3);margin-bottom:6px;font-weight:500}
.auth-field input{width:100%;padding:11px 14px;font-size:14px}
.auth-btn{width:100%;padding:12px;font-size:15px;font-weight:700;border-radius:10px;border:none;background:var(--green);color:#fff;margin-top:6px;transition:all .15s}
.auth-btn:hover{background:#0ea572}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-switch{text-align:center;margin-top:18px;font-size:13px;color:var(--text3)}
.auth-switch a{color:var(--green);cursor:pointer;text-decoration:none;font-weight:600}
.auth-switch a:hover{text-decoration:underline}
.auth-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#f87171;margin-bottom:14px;display:none}
.auth-success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#6ee7b7;margin-bottom:14px;display:none}
.auth-divider{display:flex;align-items:center;gap:12px;margin:18px 0}
.auth-divider hr{flex:1;border:none;border-top:1px solid var(--border2)}
.auth-divider span{font-size:12px;color:var(--text3)}
/* user badge in nav */
.user-badge{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:5px 12px;font-size:13px;cursor:pointer}
.user-badge:hover{background:var(--bg4)}
.user-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sync-dot.synced{background:var(--green)}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite}
.sync-dot.offline{background:var(--text4)}
/* user menu dropdown */
.user-menu{position:absolute;top:calc(100% + 8px);right:0;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:8px;min-width:200px;z-index:300;animation:slideDown .2s ease;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.user-menu-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);background:transparent;border:none;width:100%;text-align:left}
.user-menu-item:hover{background:var(--bg3);color:var(--text)}
.user-menu-sep{border:none;border-top:1px solid var(--border);margin:6px 0}

</style>
</head>
<body>
<div id="app">
  <nav id="nav">
    <div class="logo">
      <div class="logo-icon">💹</div>
      <span class="logo-text">FinanceOS</span>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="month-sel">
      <span>Mês:</span>
      <select id="monthSel" style="width:120px"></select>
    </div>
  </nav>
  <main id="main"></main>
</div>
<div id="toast">✓ <span id="toastMsg"></span></div>
<div id="onboarding" style="display:none"></div>

<div id="auth-screen" style="display:none"></div>
<div id="user-menu-wrap" style="position:relative;display:none">
  <div class="user-badge" id="user-badge" onclick="toggleUserMenu()">
    <div class="user-avatar" id="user-avatar">?</div>
    <span id="user-email-short" style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">Usuário</span>
    <div class="sync-dot synced" id="sync-dot"></div>
  </div>
  <div class="user-menu" id="user-menu" style="display:none">
    <div style="padding:10px 12px;border-bottom:1px solid var(--border);margin-bottom:6px">
      <div style="font-size:11px;color:var(--text3);margin-bottom:2px">Logado como</div>
      <div style="font-size:13px;font-weight:600;color:var(--text)" id="user-menu-email">-</div>
    </div>
    <button class="user-menu-item" onclick="forceSync()">🔄 Sincronizar agora</button>
    <button class="user-menu-item" onclick="exportAllData()">📦 Exportar todos os dados</button>
    <hr class="user-menu-sep">
    <button class="user-menu-item" onclick="signOut()" style="color:#f87171">🚪 Sair</button>
  </div>
</div>


<script>
// ─── SUPABASE CONFIG ──────────────────────────────────────────────────────────
// 🔧 SUBSTITUA pelos seus valores do painel Supabase (Settings → API)
const SUPABASE_URL  = 'https://soszlwljfgsoveixsgwl.supabase.co/rest/v1/';
const SUPABASE_ANON = 'sb_publishable_EhQBkwVzYnLtRLKuTpl2gg__7j7wpsQ';

let sb = null; // Supabase client — null até ser inicializado
let currentUser = null;
let syncTimeout = null;
const OFFLINE_MODE = SUPABASE_URL === 'COLE_SUA_URL_AQUI';

function initSupabase(){
  if(OFFLINE_MODE) return; // rodando sem configuração
  try{
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  }catch(e){ console.warn('Supabase init error:', e); }
}

// ─── STATE ───────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'financeos_v3';
const CATEGORIES = [
  {key:'essentials',   label:'Gastos Fixos Essenciais',      icon:'🏠', color:'#ef4444'},
  {key:'nonEssentials',label:'Gastos Fixos Não Essenciais',  icon:'📺', color:'#f59e0b'},
  {key:'income',       label:'Ganhos Mensais',               icon:'💰', color:'#10b981'},
  {key:'variable',     label:'Gastos Variáveis',             icon:'🛒', color:'#6366f1'},
];
const TRIP_CATS   = ['Transporte','Hospedagem','Alimentação','Passeios/Lazer','Extras'];
const TRIP_COLORS = ['#6366f1','#8b5cf6','#ec4899','#f59e0b','#06b6d4'];

let state = {
  months:{}, currentMonth:new Date().toISOString().slice(0,7),
  goals:[], cart:[], reserves:[],
  trip:{name:'',active:false,expenses:[]},
  notes:{}, onboardingDone:false,
  calEvents:{},   // key: 'YYYY-MM-DD' → [{id,name,value,type,color,category,note,paid}]
};
try{
  const s=JSON.parse(localStorage.getItem(STORAGE_KEY)||'null');
  if(s) state={...state,...s};
}catch(e){}

function save(){
  // 1. Always save locally first (instant, offline-safe)
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  // 2. Schedule cloud sync (debounced 1.5s to batch rapid changes)
  if(!OFFLINE_MODE && currentUser){
    clearTimeout(syncTimeout);
    setSyncStatus('syncing');
    syncTimeout = setTimeout(()=> syncToCloud(), 1500);
  }
}

function setSyncStatus(status){
  const dot = document.getElementById('sync-dot');
  if(!dot) return;
  dot.className = 'sync-dot ' + status;
  dot.title = {synced:'Sincronizado', syncing:'Sincronizando...', offline:'Sem conexão'}[status]||status;
}

async function syncToCloud(){
  if(!sb || !currentUser) return;
  try{
    const { error } = await sb.from('user_data').upsert({
      user_id: currentUser.id,
      data: state,
      updated_at: new Date().toISOString()
    }, { onConflict: 'user_id' });
    if(error) throw error;
    setSyncStatus('synced');
  }catch(e){
    console.warn('Sync error:', e.message);
    setSyncStatus('offline');
  }
}

async function loadFromCloud(){
  if(!sb || !currentUser) return false;
  try{
    const { data, error } = await sb.from('user_data')
      .select('data')
      .eq('user_id', currentUser.id)
      .single();
    if(error && error.code !== 'PGRST116') throw error; // PGRST116 = no rows
    if(data?.data){
      state = { ...state, ...data.data };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      return true;
    }
    return false;
  }catch(e){
    console.warn('Load error:', e.message);
    return false;
  }
}

async function forceSync(){
  toggleUserMenu();
  setSyncStatus('syncing');
  await syncToCloud();
  toast('Dados sincronizados!');
}

function exportAllData(){
  toggleUserMenu();
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `financeos-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast('Backup exportado!');
}
function uid(){ return Date.now()+Math.random().toString(36).slice(2,8); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(v){ return 'R$ '+(Math.abs(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }

function getMonthData(m){
  const d=state.months[m]||{};
  return {essentials:d.essentials||[],nonEssentials:d.nonEssentials||[],income:d.income||[],variable:d.variable||[]};
}
function setMonthItems(month,cat,items){
  if(!state.months[month]) state.months[month]={};
  state.months[month][cat]=items;
  save(); render();
}
function calcMetrics(m){
  const d=getMonthData(m);
  const totalIncome=d.income.reduce((s,i)=>s+i.value,0);
  const totalEss   =d.essentials.reduce((s,i)=>s+i.value,0);
  const totalNE    =d.nonEssentials.reduce((s,i)=>s+i.value,0);
  const totalVar   =d.variable.reduce((s,i)=>s+i.value,0);
  const totalExp   =totalEss+totalNE+totalVar;
  const totalRes   =state.reserves.reduce((s,r)=>s+r.value,0);
  const balance    =totalIncome-totalExp;
  return {totalIncome,totalEss,totalNE,totalVar,totalExp,totalRes,balance,balanceAfterRes:balance-totalRes};
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg,color){
  const el=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  el.style.background=color||'var(--green)';
  el.style.display='block';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.style.display='none',3000);
}

// ─── EXPORT MENU STATE ────────────────────────────────────────────────────────
let exportMenuOpen=false;
function toggleExportMenu(){
  exportMenuOpen=!exportMenuOpen;
  const m=document.getElementById('export-menu');
  if(m) m.style.display=exportMenuOpen?'block':'none';
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.export-wrap')) { exportMenuOpen=false; const m=document.getElementById('export-menu'); if(m) m.style.display='none'; }
});

function exportPDF(){
  exportMenuOpen=false;
  const m=document.getElementById('export-menu'); if(m) m.style.display='none';
  window.print();
}
function exportCSV(){
  exportMenuOpen=false;
  const m=document.getElementById('export-menu'); if(m) m.style.display='none';
  const md=getMonthData(state.currentMonth);
  const rows=[['Nome','Categoria','Tipo','Subcategoria','Valor']];
  CATEGORIES.forEach(cat=>{
    (md[cat.key]||[]).forEach(item=>{
      rows.push([item.name,cat.label,cat.key==='income'?'Entrada':'Saída',item.subcategory||'',item.value.toFixed(2)]);
    });
  });
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download=`financeos-${state.currentMonth}.csv`;
  a.click();
  toast('CSV exportado!');
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
const TABS=[
  {key:'dashboard',  label:'Dashboard',  icon:'📊'},
  {key:'calendar',   label:'Calendário', icon:'📅'},
  {key:'transactions',label:'Transações',icon:'📋'},
  {key:'goals',      label:'Metas',      icon:'🎯'},
  {key:'shopping',   label:'Compras',    icon:'🛒'},
  {key:'travel',     label:'Viagem',     icon:'✈️'},
];
let currentTab='dashboard';
function switchTab(key){ currentTab=key; render(); }

function renderTabs(){
  const cartCount=(state.cart||[]).length;
  document.getElementById('tabs').innerHTML=TABS.map(t=>`
    <button class="tab-btn${t.key===currentTab?' active':''}" onclick="switchTab('${t.key}')">
      ${t.icon} ${t.label}
      ${t.key==='travel'&&state.trip?.active?'<span class="tab-dot"></span>':''}
      ${t.key==='shopping'&&cartCount>0?`<span class="tab-badge">${cartCount}</span>`:''}
    </button>`).join('');
}

function renderMonthSel(){
  const sel=document.getElementById('monthSel');
  const opts=[];
  for(let i=-12;i<=3;i++){
    const d=new Date(); d.setMonth(d.getMonth()+i);
    const val=d.toISOString().slice(0,7);
    opts.push(`<option value="${val}"${val===state.currentMonth?' selected':''}>${val}</option>`);
  }
  sel.innerHTML=opts.join('');
  sel.onchange=e=>{ state.currentMonth=e.target.value; calViewMonth=e.target.value; save(); render(); };
}

// ─── CHARTS ───────────────────────────────────────────────────────────────────
const charts={};
function destroyChart(id){ if(charts[id]){charts[id].destroy();delete charts[id];} }
function makeChart(id,config){
  destroyChart(id);
  const ctx=document.getElementById(id);
  if(ctx) charts[id]=new Chart(ctx,config);
}

// ─── CONFIRM DELETE ───────────────────────────────────────────────────────────
function confirmDelete(rowId, label, onConfirm){
  const row=document.getElementById(rowId);
  if(!row) return;
  row.outerHTML=`<div class="confirm-row" id="confirm-${rowId}">
    <span>Excluir <strong>${esc(label)}</strong>?</span>
    <button class="btn-confirm-del" onclick="(${onConfirm.toString()})()">Confirmar</button>
    <button class="btn-confirm-cancel" onclick="render()">Cancelar</button>
  </div>`;
}

// ─── HEALTH SCORE ─────────────────────────────────────────────────────────────
function healthScore(M){
  if(M.balance<0) return {
    level:'red', icon:'❤️‍🔥', status:'Saldo negativo',
    msg:'Seus gastos estão maiores que sua renda este mês.',
    tips:['Identifique quais gastos variáveis podem ser cortados agora','Veja se algum gasto fixo não essencial pode ser pausado','Evite novas compras parceladas até o saldo equilibrar']
  };
  const essRatio=M.totalIncome>0?M.totalEss/M.totalIncome:0;
  if(essRatio>0.7) return {
    level:'orange', icon:'🟠', status:'Situação delicada',
    msg:`Seus gastos essenciais consomem ${(essRatio*100).toFixed(0)}% da sua renda.`,
    tips:['Gastos fixos acima de 70% da renda deixam pouca margem de manobra','Considere renegociar contratos (internet, aluguel, planos)','Qualquer imprevisto pode gerar saldo negativo']
  };
  if(essRatio>0.5||state.reserves.length===0) return {
    level:'amber', icon:'💛', status:'Atenção necessária',
    msg:essRatio>0.5?`Gastos essenciais em ${(essRatio*100).toFixed(0)}% da renda (ideal: abaixo de 50%).`:'Você não tem nenhuma reserva ou investimento configurado.',
    tips:['Tente reduzir gastos essenciais para abaixo de 50% da renda','Configure ao menos uma reserva de emergência, mesmo que pequena','Explore fontes de renda complementar']
  };
  return {
    level:'green', icon:'💚', status:'Finanças saudáveis',
    msg:'Você está com saldo positivo, reservas ativas e gastos controlados.',
    tips:['Continue mantendo os gastos essenciais abaixo de 50% da renda','Aumente gradualmente o valor das suas reservas','Considere diversificar seus investimentos']
  };
}

// ─── RECORRENTES: importar mês anterior ───────────────────────────────────────
function prevMonth(m){
  const [y,mo]=m.split('-').map(Number);
  const d=new Date(y,mo-2,1);
  return d.toISOString().slice(0,7);
}
function hasPrevData(){
  const prev=prevMonth(state.currentMonth);
  const pd=state.months[prev];
  if(!pd) return false;
  return CATEGORIES.some(cat=>(pd[cat.key]||[]).length>0);
}
function importPrevMonth(){
  const prev=prevMonth(state.currentMonth);
  const pd=state.months[prev];
  if(!pd){toast('Sem dados no mês anterior.','#f59e0b');return;}
  if(!state.months[state.currentMonth]) state.months[state.currentMonth]={};
  let added=0;
  CATEGORIES.forEach(cat=>{
    const existing=state.months[state.currentMonth][cat.key]||[];
    const existingNames=existing.map(i=>i.name.toLowerCase());
    const toAdd=(pd[cat.key]||[]).filter(i=>!existingNames.includes(i.name.toLowerCase()));
    state.months[state.currentMonth][cat.key]=[...existing,...toAdd.map(i=>({...i,id:uid()}))];
    added+=toAdd.length;
  });
  save(); render(); toast(`${added} item(s) importado(s) do mês anterior!`);
}

// ─── DISPONÍVEL HOJE ──────────────────────────────────────────────────────────
function daysLeftInMonth(){
  const now=new Date();
  const end=new Date(now.getFullYear(),now.getMonth()+1,0);
  return end.getDate()-now.getDate()+1;
}

// ─── NOTES DEBOUNCE ───────────────────────────────────────────────────────────
let notesTimer;
function saveNote(val){
  clearTimeout(notesTimer);
  notesTimer=setTimeout(()=>{
    state.notes[state.currentMonth]=val;
    save();
    const el=document.getElementById('notes-saved');
    if(el){el.style.opacity=1;setTimeout(()=>el.style.opacity=0,1500);}
  },500);
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
let dashChartType='pie';
let negAlertDismissed=false;

function renderDashboard(){
  const m=state.currentMonth;
  const md=getMonthData(m);
  const M=calcMetrics(m);
  const H=healthScore(M);
  const days=daysLeftInMonth();
  const perDay=M.balanceAfterRes>0?(M.balanceAfterRes/days):0;
  const note=state.notes[m]||'';
  const isCurrentMonth=m===new Date().toISOString().slice(0,7);

  // Negative alert
  const negAlert=(M.balance<0||M.balanceAfterRes<0)&&!negAlertDismissed?`
    <div class="alert-banner red" id="neg-alert">
      <span style="font-size:20px">⚠️</span>
      <div>
        <strong style="color:#ef4444">Atenção: saldo negativo!</strong>
        <div style="font-size:13px;color:#fca5a5;margin-top:2px">
          ${M.balance<0?`Seu saldo está negativo em ${fmt(Math.abs(M.balance))} este mês.`:`Após reservas, seu saldo fica negativo em ${fmt(Math.abs(M.balanceAfterRes))}.`}
        </div>
      </div>
      <button class="alert-banner-close" onclick="negAlertDismissed=true;document.getElementById('neg-alert').remove()">✕</button>
    </div>`:'';

  // Import prev banner
  const importBanner=hasPrevData()&&Object.keys(getMonthData(m)).every(k=>getMonthData(m)[k].length===0)?`
    <div class="import-banner" id="import-banner">
      <span style="font-size:18px">📋</span>
      <div style="flex:1">
        <strong style="color:#818cf8">Mês novo detectado!</strong>
        <div style="font-size:13px;color:var(--text3);margin-top:2px">Você tem dados no mês anterior. Deseja importar os itens?</div>
      </div>
      <button class="btn btn-green" style="font-size:12px;padding:6px 14px" onclick="importPrevMonth();document.getElementById('import-banner')?.remove()">Importar agora</button>
      <button class="icon-btn" onclick="document.getElementById('import-banner').remove()">✕</button>
    </div>`:'';

  const metricCards=[
    {label:'Total de Ganhos',    value:M.totalIncome,    color:'#10b981'},
    {label:'Fixos Essenciais',   value:M.totalEss,       color:'#ef4444'},
    {label:'Fixos N.Ess.',       value:M.totalNE,        color:'#f59e0b'},
    {label:'Gastos Variáveis',   value:M.totalVar,       color:'#6366f1'},
    {label:'Total de Gastos',    value:M.totalExp,       color:'#f43f5e'},
    {label:'Saldo Restante',     value:M.balance,        color:M.balance>=0?'#10b981':'#ef4444'},
    {label:'Saldo Pós-Reservas', value:M.balanceAfterRes,color:M.balanceAfterRes>=0?'#10b981':'#ef4444'},
  ];

  const categoryPanels=CATEGORIES.map(cat=>{
    const items=md[cat.key];
    const total=items.reduce((s,i)=>s+i.value,0);
    const isFixed=cat.key==='essentials'||cat.key==='nonEssentials';
    return `<div class="panel">
      <div class="panel-header">
        <span style="font-size:18px">${cat.icon}</span>
        <h3>${cat.label}</h3>
        <span class="total" style="color:${cat.color}">${fmt(total)}</span>
      </div>
      <div id="items-${cat.key}">
        ${items.map(item=>itemRowHTML(item,cat.key,isFixed)).join('')}
      </div>
      ${addFormHTML(cat.key,isFixed)}
    </div>`;
  }).join('');

  const reserveItems=state.reserves.map((r,i)=>`
    <div class="item-row" id="reserve-row-${i}">
      <span>💎</span>
      <span class="item-name">${esc(r.name)}</span>
      <span style="color:#06b6d4;font-weight:700">${fmt(r.value)}/mês</span>
      <button class="icon-btn" onclick="confirmDeleteReserve(${i})">🗑️</button>
    </div>`).join('');

  // Chart bar data
  const allMonths=Object.keys(state.months).sort().slice(-12);
  const barData=allMonths.map(mn=>{
    const ms=calcMetrics(mn);
    return {name:mn.slice(5)+'/'+mn.slice(2,4),Ganhos:ms.totalIncome,Gastos:ms.totalExp,Saldo:ms.balance};
  });

  // Rankings
  const monthStats=allMonths.map(mn=>({...calcMetrics(mn),month:mn}));
  const rankDefs=[
    {label:'Maior gasto total',   key:'totalExp',   sort:'desc',color:'#ef4444'},
    {label:'Menor gasto total',   key:'totalExp',   sort:'asc', color:'#10b981'},
    {label:'Maior ganho',         key:'totalIncome',sort:'desc',color:'#10b981'},
    {label:'Melhor saldo',        key:'balance',    sort:'desc',color:'#06b6d4'},
    {label:'Pior saldo',          key:'balance',    sort:'asc', color:'#ef4444'},
    {label:'Maior gasto fixo',    key:'totalEss',   sort:'desc',color:'#f59e0b'},
    {label:'Maior gasto variável',key:'totalVar',   sort:'desc',color:'#6366f1'},
  ];
  const rankHTML=monthStats.length<2?'<p style="color:var(--text4);text-align:center;padding:20px">Registre dados em mais meses para ver os rankings</p>':
    rankDefs.map(rd=>{
      const sorted=[...monthStats].sort((a,b)=>rd.sort==='desc'?b[rd.key]-a[rd.key]:a[rd.key]-b[rd.key]);
      const best=sorted[0];
      const maxVal=Math.max(...monthStats.map(s=>Math.abs(s[rd.key])));
      const pct=maxVal>0?(Math.abs(best[rd.key])/maxVal)*100:0;
      return `<div class="rank-item">
        <div class="rank-item-header">
          <span class="rank-label">${rd.label}</span>
          <span style="color:${rd.color};font-weight:700">${best.month} — ${fmt(Math.abs(best[rd.key]))}</span>
        </div>
        <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%;background:${rd.color}"></div></div>
      </div>`;
    }).join('');

  document.getElementById('main').innerHTML=`
  ${negAlert}
  ${importBanner}
  <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between">
    <div><h1>📊 Dashboard</h1><p>Visão geral de ${m}</p></div>
    <div style="display:flex;gap:8px;align-items:center" class="no-print">
      <button class="btn btn-ghost" style="font-size:12px;padding:6px 12px" onclick="importPrevMonth()">📋 Copiar mês anterior</button>
      <div class="export-wrap">
        <button class="btn btn-ghost" style="font-size:12px;padding:6px 12px" onclick="toggleExportMenu()">⬇️ Exportar ▾</button>
        <div class="export-menu" id="export-menu" style="display:none">
          <button onclick="exportPDF()">🖨️ Exportar PDF</button>
          <button onclick="exportCSV()">📄 Exportar CSV</button>
        </div>
      </div>
    </div>
  </div>

  <div class="metrics-grid">${metricCards.map(c=>`
    <div class="metric-card">
      <div class="label">${c.label}</div>
      <div class="value" style="color:${c.color}">${c.value<0?'−':''}${fmt(Math.abs(c.value))}</div>
    </div>`).join('')}
  </div>

  <!-- HEALTH CARD -->
  <div class="health-card ${H.level}">
    <div class="health-emoji">${H.icon}</div>
    <div style="flex:1">
      <div style="font-size:17px;font-weight:700;margin-bottom:3px">${H.status}</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:8px">${H.msg}</div>
      <div class="health-tips">
        ${H.tips.map(t=>`<div class="health-tip"><span>→</span><span>${t}</span></div>`).join('')}
      </div>
    </div>
  </div>

  <!-- TODAY CARD -->
  ${isCurrentMonth?`
  <div class="today-card">
    <div>

      <div class="today-amount">${perDay>0?fmt(perDay):'⚠️ R$ 0,00'}</div>
      <div class="today-sub">${perDay>0?'por dia':'sem saldo disponível'}</div>
    </div>
    <div style="height:50px;width:1px;background:var(--border2)"></div>
    <div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:6px">Dias restantes no mês</div>
      <div style="font-size:24px;font-weight:700;color:var(--cyan)">${days}</div>
    </div>
    <div style="height:50px;width:1px;background:var(--border2)"></div>
    <div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:6px">Saldo total disponível</div>
      <div style="font-size:18px;font-weight:700;color:${M.balanceAfterRes>=0?'var(--green)':'var(--red)'}">${fmt(M.balanceAfterRes)}</div>

  <div class="two-col">
    <div>${categoryPanels}</div>
    <div>
      <!-- RESERVAS -->
      <div class="panel">
        <div class="panel-header">
          <span>💎</span><h3>Reservas & Investimentos</h3>
          <span class="total" style="color:#06b6d4">${fmt(M.totalRes)}/mês</span>
          <button class="btn btn-green no-print" style="margin-left:8px;font-size:12px;padding:5px 12px" onclick="toggleReserveForm()">+ Add</button>
        </div>
        <div id="reserve-list">${reserveItems}</div>
        <div id="reserve-form" style="display:none">
          <div class="add-form" style="padding-top:10px">
            <input id="res-name" placeholder="Ex: Reserva de Emergência" style="flex:1;min-width:140px">
            <input id="res-val" type="number" placeholder="R$/mês" style="width:110px">
            <button class="btn btn-green" onclick="addReserve()">Salvar</button>
            <button class="btn btn-ghost" onclick="toggleReserveForm()">✕</button>
          </div>
        </div>
      </div>

      <!-- GRÁFICOS -->
      <div class="panel">
        <div class="panel-header">
          <span>📊</span><h3>Gráficos</h3>
          <div class="chart-toggles no-print">
            <button class="chart-toggle${dashChartType==='pie'?' active':''}" onclick="setDashChart('pie')">Pizza</button>
            <button class="chart-toggle${dashChartType==='bar'?' active':''}" onclick="setDashChart('bar')">Barras</button>
            <button class="chart-toggle${dashChartType==='line'?' active':''}" onclick="setDashChart('line')">Linha</button>
          </div>
        </div>
        <div style="position:relative;height:260px"><canvas id="dashChart"></canvas></div>
      </div>

      <!-- NOTAS -->
      <div class="panel">
        <div class="panel-header"><span>📝</span><h3>Observações do mês</h3></div>
        <textarea id="month-notes" placeholder="Anote aqui o contexto deste mês: imprevistos, conquistas, observações..." style="width:100%;min-height:90px" oninput="saveNote(this.value)">${esc(note)}</textarea>
        <div class="notes-saved" id="notes-saved" style="opacity:0">Salvo ✓</div>
      </div>

      <!-- RANKING -->
      <div class="panel">
        <div class="panel-header"><span>🏆</span><h3>Ranking Mensal</h3></div>
        ${rankHTML}
      </div>
    </div>
  </div>`;

  // Charts
  const pieItems=[
    {name:'Fixos Essenciais',value:M.totalEss,color:'#ef4444'},
    {name:'Fixos N.Ess.',value:M.totalNE,color:'#f59e0b'},
    {name:'Variáveis',value:M.totalVar,color:'#6366f1'},
    {name:'Reservas',value:M.totalRes,color:'#06b6d4'},
  ].filter(d=>d.value>0);

  const chartTooltip={callbacks:{label:ctx=>' '+fmt(typeof ctx.parsed==='number'?ctx.parsed:ctx.parsed.y)}};
  const chartGrid={color:'#1e293b'};
  const chartTick={color:'#475569'};
  const fmtK=v=>'R$'+(v/1000).toFixed(0)+'k';

  if(dashChartType==='pie'){
    makeChart('dashChart',{type:'pie',data:{labels:pieItems.map(d=>d.name),datasets:[{data:pieItems.map(d=>d.value),backgroundColor:pieItems.map(d=>d.color),borderColor:'#0f172a',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#94a3b8',font:{size:12}}},tooltip:chartTooltip}}});
  }else if(dashChartType==='bar'){
    makeChart('dashChart',{type:'bar',data:{labels:barData.map(d=>d.name),datasets:[{label:'Ganhos',data:barData.map(d=>d.Ganhos),backgroundColor:'#10b981',borderRadius:4},{label:'Gastos',data:barData.map(d=>d.Gastos),backgroundColor:'#ef4444',borderRadius:4},{label:'Saldo',data:barData.map(d=>d.Saldo),backgroundColor:'#6366f1',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,scales:{x:{ticks:chartTick,grid:chartGrid},y:{ticks:{...chartTick,callback:fmtK},grid:chartGrid}},plugins:{legend:{labels:{color:'#94a3b8'}},tooltip:chartTooltip}}});
  }else{
    makeChart('dashChart',{type:'line',data:{labels:barData.map(d=>d.name),datasets:[{label:'Ganhos',data:barData.map(d=>d.Ganhos),borderColor:'#10b981',backgroundColor:'rgba(16,185,129,.1)',tension:.3,fill:true},{label:'Gastos',data:barData.map(d=>d.Gastos),borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,.05)',tension:.3},{label:'Saldo',data:barData.map(d=>d.Saldo),borderColor:'#6366f1',backgroundColor:'rgba(99,102,241,.05)',tension:.3}]},options:{responsive:true,maintainAspectRatio:false,scales:{x:{ticks:chartTick,grid:chartGrid},y:{ticks:{...chartTick,callback:fmtK},grid:chartGrid}},plugins:{legend:{labels:{color:'#94a3b8'}},tooltip:chartTooltip}}});
  }
}

function setDashChart(t){ dashChartType=t; renderDashboard(); }

// ─── ITEM HELPERS ─────────────────────────────────────────────────────────────
function itemRowHTML(item,cat,showRecur=false){
  return `<div class="item-row" id="row-${item.id}">
    <div class="item-dot" style="background:${item.color}"></div>
    <span class="item-name">${esc(item.name)}</span>
    ${item.subcategory?`<span class="item-sub">${esc(item.subcategory)}</span>`:''}
    ${item.recurring?'<span class="recur-badge">🔁 fixo</span>':''}
    <span class="item-val" style="color:#10b981">${fmt(item.value)}</span>
    <button class="icon-btn no-print" onclick="editItem('${cat}','${item.id}')">✏️</button>
    <button class="icon-btn no-print" onclick="askDeleteItem('${cat}','${item.id}','${esc(item.name)}')">🗑️</button>
  </div>`;
}

function addFormHTML(cat,showRecur=false){
  return `<div class="add-form" style="margin-top:8px">
    <input placeholder="Nome" id="add-name-${cat}" style="flex:1;min-width:100px">
    <input type="number" placeholder="Valor" id="add-val-${cat}" style="width:90px">
    <input placeholder="Subcategoria" id="add-sub-${cat}" style="width:100px">
    <input type="color" id="add-color-${cat}" value="#10b981">
    ${showRecur?`<label style="display:flex;align-items:center;gap:5px;color:var(--text3);font-size:12px;white-space:nowrap"><input type="checkbox" id="add-recur-${cat}"> Fixo 🔁</label>`:''}
    <button class="btn btn-green" onclick="addItem('${cat}')">+ Add</button>
  </div>`;
}

function addItem(cat){
  const name =document.getElementById('add-name-'+cat)?.value.trim();
  const val  =parseFloat(document.getElementById('add-val-'+cat)?.value);
  const sub  =document.getElementById('add-sub-'+cat)?.value.trim();
  const color=document.getElementById('add-color-'+cat)?.value||'#10b981';
  const recur=document.getElementById('add-recur-'+cat)?.checked||false;
  if(!name||isNaN(val)) return;
  const md=getMonthData(state.currentMonth);
  md[cat].push({id:uid(),name,value:val,subcategory:sub,color,recurring:recur});
  setMonthItems(state.currentMonth,cat,md[cat]);
  toast('Item adicionado!');
}

function askDeleteItem(cat,id,name){
  const rowId='row-'+id;
  const row=document.getElementById(rowId);
  if(!row) return;
  row.outerHTML=`<div class="confirm-row" id="confirm-${id}">
    <span>Excluir <strong>${esc(name)}</strong>?</span>
    <button class="btn-confirm-del" onclick="doDeleteItem('${cat}','${id}')">Confirmar</button>
    <button class="btn-confirm-cancel" onclick="render()">Cancelar</button>
  </div>`;
}

function doDeleteItem(cat,id){
  const md=getMonthData(state.currentMonth);
  md[cat]=md[cat].filter(i=>i.id!==id);
  setMonthItems(state.currentMonth,cat,md[cat]);
  toast('Item removido!');
}

function editItem(cat,id){
  const md=getMonthData(state.currentMonth);
  const item=md[cat].find(i=>i.id===id);
  if(!item) return;
  const row=document.getElementById('row-'+id);
  if(!row) return;
  const isFixed=cat==='essentials'||cat==='nonEssentials';
  row.outerHTML=`<div class="add-form" id="edit-form-${id}">
    <input id="e-name-${id}" value="${esc(item.name)}" style="flex:1;min-width:100px">
    <input type="number" id="e-val-${id}" value="${item.value}" style="width:90px">
    <input id="e-sub-${id}" value="${esc(item.subcategory||'')}" placeholder="Subcategoria" style="width:100px">
    <input type="color" id="e-color-${id}" value="${item.color}">
    ${isFixed?`<label style="display:flex;align-items:center;gap:5px;color:var(--text3);font-size:12px;white-space:nowrap"><input type="checkbox" id="e-recur-${id}"${item.recurring?' checked':''}> Fixo 🔁</label>`:''}
    <button class="btn btn-green" onclick="saveEdit('${cat}','${id}')">Salvar</button>
    <button class="btn btn-ghost" onclick="render()">✕</button>
  </div>`;
}

function saveEdit(cat,id){
  const name =document.getElementById('e-name-'+id)?.value.trim();
  const val  =parseFloat(document.getElementById('e-val-'+id)?.value);
  const sub  =document.getElementById('e-sub-'+id)?.value.trim();
  const color=document.getElementById('e-color-'+id)?.value||'#10b981';
  const recur=document.getElementById('e-recur-'+id)?.checked||false;
  if(!name||isNaN(val)) return;
  const md=getMonthData(state.currentMonth);
  md[cat]=md[cat].map(i=>i.id===id?{...i,name,value:val,subcategory:sub,color,recurring:recur}:i);
  setMonthItems(state.currentMonth,cat,md[cat]);
  toast('Item atualizado!');
}

// ─── RESERVES ─────────────────────────────────────────────────────────────────
function toggleReserveForm(){
  const f=document.getElementById('reserve-form');
  if(f) f.style.display=f.style.display==='none'?'block':'none';
}
function addReserve(){
  const name=document.getElementById('res-name')?.value.trim();
  const val =parseFloat(document.getElementById('res-val')?.value);
  if(!name||isNaN(val)) return;
  state.reserves.push({name,value:val});
  save(); render(); toast('Reserva adicionada!');
}
function confirmDeleteReserve(i){
  const rowId='reserve-row-'+i;
  const row=document.getElementById(rowId);
  if(!row) return;
  const name=state.reserves[i]?.name||'esta reserva';
  row.outerHTML=`<div class="confirm-row" id="confirm-res-${i}">
    <span>Excluir <strong>${esc(name)}</strong>?</span>
    <button class="btn-confirm-del" onclick="doDeleteReserve(${i})">Confirmar</button>
    <button class="btn-confirm-cancel" onclick="render()">Cancelar</button>
  </div>`;
}
function doDeleteReserve(i){
  state.reserves.splice(i,1);
  save(); render(); toast('Reserva removida!');
}

// ─── TRANSACTIONS ─────────────────────────────────────────────────────────────
let txFilter={month:'',type:'all',category:'all'};
let txSort='date';

function renderTransactions(){
  const allItems=[];
  Object.entries(state.months).forEach(([month,md])=>{
    CATEGORIES.forEach(cat=>{
      (md[cat.key]||[]).forEach(item=>{
        allItems.push({...item,month,catKey:cat.key,catLabel:cat.label,type:cat.key==='income'?'entrada':'saída'});
      });
    });
  });

  let filtered=[...allItems];
  if(txFilter.month) filtered=filtered.filter(i=>i.month===txFilter.month);
  if(txFilter.type!=='all') filtered=filtered.filter(i=>i.type===txFilter.type);
  if(txFilter.category!=='all') filtered=filtered.filter(i=>i.catKey===txFilter.category);
  if(txSort==='value') filtered.sort((a,b)=>b.value-a.value);
  else if(txSort==='name') filtered.sort((a,b)=>a.name.localeCompare(b.name));
  else filtered.sort((a,b)=>b.month.localeCompare(a.month));

  const months=[...new Set(allItems.map(i=>i.month))].sort().reverse();
  const net=filtered.reduce((s,i)=>s+(i.type==='entrada'?i.value:-i.value),0);

  document.getElementById('main').innerHTML=`
  <div class="page-header"><h1>📋 Transações</h1><p>Histórico completo de transações</p></div>
  <div class="filter-row">
    <select onchange="txFilter.month=this.value;renderTransactions()">
      <option value="">Todos os meses</option>
      ${months.map(mn=>`<option value="${mn}"${mn===txFilter.month?' selected':''}>${mn}</option>`).join('')}
    </select>
    <select onchange="txFilter.type=this.value;renderTransactions()">
      <option value="all">Entrada e Saída</option>
      <option value="entrada"${txFilter.type==='entrada'?' selected':''}>Entradas</option>
      <option value="saída"${txFilter.type==='saída'?' selected':''}>Saídas</option>
    </select>
    <select onchange="txFilter.category=this.value;renderTransactions()">
      <option value="all">Todas as categorias</option>
      ${CATEGORIES.map(c=>`<option value="${c.key}"${c.key===txFilter.category?' selected':''}>${c.label}</option>`).join('')}
    </select>
    <select onchange="txSort=this.value;renderTransactions()">
      <option value="date"${txSort==='date'?' selected':''}>Por data</option>
      <option value="value"${txSort==='value'?' selected':''}>Por valor</option>
      <option value="name"${txSort==='name'?' selected':''}>Por nome</option>
    </select>
  </div>
  <div class="panel" style="padding:0;overflow:hidden">
    <table class="data-table">
      <thead><tr>
        <th>Item</th><th>Categoria</th><th>Tipo</th><th>Mês</th>
        <th style="text-align:right">Valor</th><th></th>
      </tr></thead>
      <tbody id="tx-body">
        ${filtered.length===0?'<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text4)">Nenhuma transação encontrada</td></tr>':
          filtered.map(item=>`<tr id="tx-row-${item.id}-${item.month}">
            <td><div style="display:flex;align-items:center;gap:8px">
              <div style="width:8px;height:8px;border-radius:50%;background:${item.color};flex-shrink:0"></div>
              ${esc(item.name)}
              ${item.subcategory?`<span class="item-sub">${esc(item.subcategory)}</span>`:''}
              ${item.recurring?'<span class="recur-badge">🔁</span>':''}
            </div></td>
            <td style="color:var(--text3)">${item.catLabel}</td>
            <td><span class="badge ${item.type==='entrada'?'badge-in':'badge-out'}">${item.type}</span></td>
            <td style="color:var(--text3)">${item.month}</td>
            <td style="text-align:right;font-weight:700;color:${item.type==='entrada'?'#10b981':'#f1f5f9'}">${fmt(item.value)}</td>
            <td><button class="icon-btn" onclick="askDeleteTxItem('${item.month}','${item.catKey}','${item.id}','${esc(item.name)}')">🗑️</button></td>
          </tr>`).join('')}
      </tbody>
    </table>
    <div class="cart-summary">
      <span style="color:var(--text3)">${filtered.length} transações</span>
      <span style="font-size:16px;font-weight:700;color:${net>=0?'#10b981':'#ef4444'}">${net<0?'−':''}${fmt(Math.abs(net))}</span>
    </div>
  </div>`;
}

function askDeleteTxItem(month,cat,id,name){
  const rowId=`tx-row-${id}-${month}`;
  const row=document.getElementById(rowId);
  if(!row) return;
  row.outerHTML=`<tr id="confirm-tx-${id}"><td colspan="6">
    <div class="confirm-row" style="border:none;padding:8px 14px">
      <span>Excluir <strong>${esc(name)}</strong>?</span>
      <button class="btn-confirm-del" onclick="doDeleteTxItem('${month}','${cat}','${id}')">Confirmar</button>
      <button class="btn-confirm-cancel" onclick="renderTransactions()">Cancelar</button>
    </div>
  </td></tr>`;
}
function doDeleteTxItem(month,cat,id){
  if(!state.months[month]) return;
  state.months[month][cat]=(state.months[month][cat]||[]).filter(i=>i.id!==id);
  save(); renderTransactions(); toast('Transação removida!');
}

// ─── GOALS ────────────────────────────────────────────────────────────────────
let simGoalId=null,simOverride=0;

function renderGoals(){
  const M=calcMetrics(state.currentMonth);
  const avail=M.balanceAfterRes;

  const goalsHTML=state.goals.length===0?`<div class="empty"><div class="emoji">🎯</div><p>Nenhuma meta criada ainda</p><p style="font-size:13px;margin-top:6px">Crie sua primeira meta financeira!</p></div>`:
    `<div class="goals-grid">${state.goals.map(goal=>{
      const rem=goal.total-goal.saved;
      const prog=Math.min(100,(goal.saved/goal.total)*100);
      const mos=avail>0?Math.ceil(rem/avail):Infinity;
      return `<div class="goal-card" id="goal-card-${goal.id}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
          <h3 style="font-size:15px">🎯 ${esc(goal.name)}</h3>
          <button class="icon-btn" onclick="askDeleteGoal('${goal.id}','${esc(goal.name)}')">🗑️</button>
        </div>
        <div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px">
            <span style="color:var(--text3)">Progresso</span>
            <span style="color:#10b981;font-weight:700">${prog.toFixed(0)}%</span>
          </div>
          <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${prog}%;background:linear-gradient(90deg,#10b981,#06b6d4)"></div></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
          <div style="background:var(--bg3);border-radius:8px;padding:10px 12px">
            <p style="font-size:11px;color:var(--text3);margin-bottom:4px">Guardado</p>
            <p style="font-size:15px;font-weight:700;color:#10b981">${fmt(goal.saved)}</p>
          </div>
          <div style="background:var(--bg3);border-radius:8px;padding:10px 12px">
            <p style="font-size:11px;color:var(--text3);margin-bottom:4px">Faltam</p>
            <p style="font-size:15px;font-weight:700">${fmt(rem)}</p>
          </div>
        </div>
        <div style="background:var(--bg3);border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <span style="font-size:13px;color:var(--text3)">Tempo estimado</span>
          <span style="color:#f59e0b;font-weight:700;font-size:16px">${mos===Infinity?'∞':`${mos} mes${mos!==1?'es':''}`}</span>
        </div>
        <button onclick="toggleSim('${goal.id}')" style="width:100%;background:${simGoalId===goal.id?'#1e3a5f':'var(--bg3)'};border:1px solid var(--border2);border-radius:8px;padding:8px;color:#60a5fa;font-size:13px">
          ${simGoalId===goal.id?'Fechar Simulação':'🔮 Simular Cenários'}
        </button>
      </div>`;
    }).join('')}</div>`;

  const simGoal=state.goals.find(g=>g.id===simGoalId);
  const simHTML=simGoal?`
    <div class="panel" style="border:2px solid #1d4ed8">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
        <span style="font-size:18px">🔮</span>
        <h3 style="color:#60a5fa">Simulação — ${esc(simGoal.name)}</h3>
        <span style="margin-left:auto;font-size:11px;color:var(--text4);background:var(--bg3);padding:3px 10px;border-radius:20px">Não altera dados reais</span>
      </div>
      <p style="color:var(--text3);font-size:13px;margin-bottom:16px">Ajuste o valor extra que guardaria por mês:</p>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
        <span style="color:var(--text3);font-size:14px">+ R$ /mês:</span>
        <input type="number" id="simOverride" value="${simOverride}" style="width:120px" oninput="updateSim(this.value,'${simGoal.id}')">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px" id="simResults">
        ${simResultsHTML(simGoal,avail,simOverride)}
      </div>
    </div>`:'';

  document.getElementById('main').innerHTML=`
  <div class="page-header"><h1>🎯 Metas</h1><p>Acompanhe e simule suas metas financeiras</p></div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <p style="color:var(--text3)">Disponível/mês: <span style="color:#10b981;font-weight:700">${fmt(avail)}</span></p>
    <button class="btn btn-green" onclick="toggleGoalForm()">+ Nova Meta</button>
  </div>
  <div id="goal-form" style="display:none" class="panel">
    <h3 style="margin-bottom:14px">Nova Meta Financeira</h3>
    <div class="add-form">
      <input id="g-name" placeholder="Nome da meta" style="flex:1;min-width:140px">
      <input type="number" id="g-total" placeholder="Valor total (R$)" style="width:150px">
      <input type="number" id="g-saved" placeholder="Já guardado (R$)" style="width:150px">
      <button class="btn btn-green" onclick="addGoal()">Criar</button>
      <button class="btn btn-ghost" onclick="toggleGoalForm()">✕</button>
    </div>
  </div>
  ${goalsHTML}
  ${simHTML}`;
}

function simResultsHTML(goal,avail,extra){
  const cap=avail+(parseFloat(extra)||0);
  const rem=goal.total-goal.saved;
  const mos=cap>0?Math.ceil(rem/cap):Infinity;
  return `
    <div style="background:var(--bg3);border-radius:10px;padding:14px 16px">
      <p style="font-size:12px;color:var(--text3);margin-bottom:6px">Saldo atual/mês</p>
      <p style="font-size:18px;font-weight:700;color:#10b981">${fmt(avail)}</p>
    </div>
    <div style="background:var(--bg3);border-radius:10px;padding:14px 16px">
      <p style="font-size:12px;color:var(--text3);margin-bottom:6px">Capacidade simulada</p>
      <p style="font-size:18px;font-weight:700;color:#60a5fa">${fmt(cap)}</p>
    </div>
    <div style="background:var(--bg3);border-radius:10px;padding:14px 16px">
      <p style="font-size:12px;color:var(--text3);margin-bottom:6px">Tempo estimado</p>
      <p style="font-size:18px;font-weight:700;color:#f59e0b">${mos===Infinity?'∞':`${mos} meses`}</p>
    </div>`;
}
function updateSim(val,gid){
  simOverride=parseFloat(val)||0;
  const goal=state.goals.find(g=>g.id===gid);
  const M=calcMetrics(state.currentMonth);
  const el=document.getElementById('simResults');
  if(goal&&el) el.innerHTML=simResultsHTML(goal,M.balanceAfterRes,simOverride);
}
function toggleGoalForm(){
  const f=document.getElementById('goal-form');
  if(f) f.style.display=f.style.display==='none'?'block':'none';
}
function toggleSim(id){ simGoalId=simGoalId===id?null:id; simOverride=0; renderGoals(); }
function addGoal(){
  const name=document.getElementById('g-name')?.value.trim();
  const total=parseFloat(document.getElementById('g-total')?.value);
  const saved=parseFloat(document.getElementById('g-saved')?.value)||0;
  if(!name||isNaN(total)) return;
  state.goals.push({id:uid(),name,total,saved});
  save(); renderGoals(); toast('Meta criada!');
}
function askDeleteGoal(id,name){
  const card=document.getElementById('goal-card-'+id);
  if(!card) return;
  card.innerHTML=`<div class="confirm-row" style="border:none;padding:20px;justify-content:center;flex-direction:column;gap:12px;text-align:center">
    <span>Excluir a meta <strong>${esc(name)}</strong>?</span>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn-confirm-del" onclick="doDeleteGoal('${id}')">Confirmar</button>
      <button class="btn-confirm-cancel" onclick="renderGoals()">Cancelar</button>
    </div>
  </div>`;
}
function doDeleteGoal(id){
  state.goals=state.goals.filter(g=>g.id!==id);
  if(simGoalId===id) simGoalId=null;
  save(); renderGoals(); toast('Meta removida!');
}

// ─── SHOPPING ─────────────────────────────────────────────────────────────────
let cartSortBy='none';

function renderShopping(){
  const cart=state.cart||[];
  let sorted=[...cart];
  if(cartSortBy==='expensive') sorted.sort((a,b)=>b.price-a.price);
  else if(cartSortBy==='cheap') sorted.sort((a,b)=>a.price-b.price);
  else if(cartSortBy==='qty') sorted.sort((a,b)=>b.qty-a.qty);
  else if(cartSortBy==='impact') sorted.sort((a,b)=>(b.qty*b.price)-(a.qty*a.price));
  const total=cart.reduce((s,i)=>s+i.qty*i.price,0);

  document.getElementById('main').innerHTML=`
  <div class="page-header"><h1>🛒 Compras</h1><p>Calcule suas compras antes de ir ao mercado</p></div>
  <div class="panel">
    <h3 style="margin-bottom:14px">Adicionar Item</h3>
    <div class="add-form">
      <input id="cart-name" placeholder="Nome do produto" style="flex:1;min-width:140px">
      <input type="number" id="cart-qty" value="1" min="1" style="width:70px" placeholder="Qtd">
      <input type="number" id="cart-price" step="0.01" placeholder="Valor unit. (R$)" style="width:140px">
      <button class="btn btn-green" onclick="addCartItem()">+ Adicionar</button>
    </div>
  </div>
  ${cart.length===0?`<div class="empty"><div class="emoji">🛒</div><p>Carrinho vazio</p><p style="font-size:13px;margin-top:6px">Adicione produtos para calcular sua compra</p></div>`:`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <h3>Carrinho (${cart.length} itens)</h3>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:13px;color:var(--text3)">Ordenar:</span>
      <select onchange="cartSortBy=this.value;renderShopping()" style="font-size:13px">
        <option value="none">Adicionado</option>
        <option value="expensive"${cartSortBy==='expensive'?' selected':''}>Mais caro</option>
        <option value="cheap"${cartSortBy==='cheap'?' selected':''}>Mais barato</option>
        <option value="qty"${cartSortBy==='qty'?' selected':''}>Maior qtd</option>
        <option value="impact"${cartSortBy==='impact'?' selected':''}>Maior impacto</option>
      </select>
    </div>
  </div>
  <div class="panel" style="padding:0;overflow:hidden;margin-bottom:16px">
    <table class="data-table">
      <thead><tr>
        <th>Produto</th><th style="text-align:center">Qtd</th>
        <th style="text-align:right">Unit.</th><th style="text-align:right">Subtotal</th>
        <th style="text-align:right">% total</th><th></th>
      </tr></thead>
      <tbody>
        ${sorted.map(item=>`<tr id="cart-row-${item.id}">
          <td>${esc(item.name)}</td>
          <td style="text-align:center;color:var(--text2)">${item.qty}</td>
          <td style="text-align:right;color:var(--text2)">${fmt(item.price)}</td>
          <td style="text-align:right;font-weight:700;color:#10b981">${fmt(item.qty*item.price)}</td>
          <td style="text-align:right;color:var(--text3)">${total>0?((item.qty*item.price/total)*100).toFixed(1):0}%</td>
          <td><button class="icon-btn" onclick="askRemoveCartItem('${item.id}','${esc(item.name)}')">🗑️</button></td>
        </tr>`).join('')}
      </tbody>
    </table>
    <div class="cart-summary">
      <span style="color:var(--text3)">Total da compra</span>
      <span style="font-size:22px;font-weight:800;color:#10b981">${fmt(total)}</span>
    </div>
  </div>
  <div style="display:flex;gap:12px">
    <button class="btn btn-ghost" onclick="askClearCart()" style="padding:12px 20px;font-size:14px">🗑️ Limpar</button>
    <button class="btn btn-green" onclick="registerPurchase()" style="flex:1;padding:12px;font-size:15px;font-weight:700;border-radius:10px">
      📊 Registrar compra nas finanças
    </button>
  </div>`}`;
}

function addCartItem(){
  const name =document.getElementById('cart-name')?.value.trim();
  const qty  =parseFloat(document.getElementById('cart-qty')?.value)||1;
  const price=parseFloat(document.getElementById('cart-price')?.value);
  if(!name||isNaN(price)) return;
  if(!state.cart) state.cart=[];
  state.cart.push({id:uid(),name,qty,price});
  save(); renderShopping(); renderTabs(); toast('Item adicionado!');
}
function askRemoveCartItem(id,name){
  const row=document.getElementById('cart-row-'+id);
  if(!row) return;
  row.outerHTML=`<tr id="confirm-cart-${id}"><td colspan="6">
    <div class="confirm-row" style="border:none;padding:8px 14px">
      <span>Remover <strong>${esc(name)}</strong>?</span>
      <button class="btn-confirm-del" onclick="doRemoveCartItem('${id}')">Confirmar</button>
      <button class="btn-confirm-cancel" onclick="renderShopping()">Cancelar</button>
    </div>
  </td></tr>`;
}
function doRemoveCartItem(id){
  state.cart=(state.cart||[]).filter(i=>i.id!==id);
  save(); renderShopping(); renderTabs(); toast('Item removido!');
}
function askClearCart(){
  if(confirm('Limpar todo o carrinho?')){ state.cart=[]; save(); renderShopping(); renderTabs(); }
}
function registerPurchase(){
  const cart=state.cart||[];
  if(!cart.length) return;
  const total=cart.reduce((s,i)=>s+i.qty*i.price,0);
  const date=new Date().toLocaleDateString('pt-BR');
  const item={id:uid(),name:`Compras — ${date}`,value:total,color:'#6366f1',subcategory:'Supermercado'};
  const md=getMonthData(state.currentMonth);
  md.variable.push(item);
  state.months[state.currentMonth]=state.months[state.currentMonth]||{};
  state.months[state.currentMonth].variable=md.variable;
  state.cart=[];
  save(); renderShopping(); renderTabs(); toast('Compra registrada nas finanças!');
}

// ─── TRAVEL ───────────────────────────────────────────────────────────────────
let tripChartType='pie';
let editingTripName=false;

function renderTravel(){
  const trip=state.trip||{name:'',active:false,expenses:[]};
  const expenses=trip.expenses||[];

  if(!trip.active){
    document.getElementById('main').innerHTML=`
    <div class="page-header"><h1>✈️ Modo Viagem</h1><p>Controle gastos da sua viagem</p></div>
    <div style="text-align:center;padding:60px 20px">
      <div style="font-size:64px;margin-bottom:16px">✈️</div>
      <h2 style="margin-bottom:8px;font-size:22px">Modo Viagem</h2>
      <p style="color:var(--text3);font-size:15px;margin-bottom:28px">Ative para registrar gastos da viagem separadamente das suas finanças</p>
      <div style="display:inline-flex;gap:10px;align-items:center">
        <input id="trip-name-input" placeholder="Nome da viagem (ex: Europa 2025)" style="width:260px;padding:12px 16px;font-size:14px">
        <button class="btn btn-purple" style="padding:12px 24px;font-size:15px" onclick="startTrip()">Iniciar ✈️</button>
      </div>
    </div>`;
    return;
  }

  const total=expenses.reduce((s,e)=>s+e.value,0);
  const catTotals=TRIP_CATS.map((cat,i)=>({name:cat,value:expenses.filter(e=>e.category===cat).reduce((s,e)=>s+e.value,0),color:TRIP_COLORS[i]})).filter(c=>c.value>0);

  const tripNameHTML=editingTripName
    ?`<div style="display:flex;align-items:center;gap:8px">
        <input id="trip-name-edit" value="${esc(trip.name)}" style="font-size:18px;font-weight:700;background:rgba(255,255,255,.08);border:1px solid #6d28d9;color:#e2e8f0;padding:4px 10px;border-radius:6px">
        <button class="btn btn-purple" style="padding:5px 12px;font-size:12px" onclick="saveTripName()">Salvar</button>
        <button class="btn btn-ghost" style="padding:5px 10px;font-size:12px" onclick="editingTripName=false;renderTravel()">✕</button>
      </div>`
    :`<h2 style="font-size:22px;cursor:pointer" onclick="editingTripName=true;renderTravel()" title="Clique para renomear">✈️ ${esc(trip.name)} <span style="font-size:14px;color:#a78bfa;opacity:.7">✏️</span></h2>`;

  document.getElementById('main').innerHTML=`
  <div class="page-header"><h1>✈️ Modo Viagem</h1></div>
  <div class="trip-header">
    <div>${tripNameHTML}
      <div style="font-size:12px;color:#a78bfa;margin-top:4px;text-transform:uppercase;letter-spacing:.08em">Modo Viagem Ativo</div>
    </div>
    <div style="text-align:right">
      <div style="font-size:12px;color:#a78bfa;margin-bottom:2px">Total gasto</div>
      <div style="font-size:26px;font-weight:800;color:#a78bfa">${fmt(total)}</div>
    </div>
  </div>
  <div class="two-col">
    <div>
      <div class="panel">
        <h3 style="margin-bottom:14px">Registrar Gasto</h3>
        <div style="display:flex;flex-direction:column;gap:10px">
          <input id="t-desc" placeholder="Descrição">
          <div style="display:flex;gap:10px">
            <input type="number" id="t-val" placeholder="Valor (R$)" style="flex:1">
            <input type="date" id="t-date" value="${new Date().toISOString().slice(0,10)}" style="flex:1">
          </div>
          <select id="t-cat">${TRIP_CATS.map(c=>`<option>${c}</option>`).join('')}</select>
          <button class="btn btn-purple" onclick="addTripExpense()" style="padding:12px;font-size:14px;font-weight:700;border-radius:8px">+ Adicionar Gasto</button>
        </div>
      </div>
      <div class="panel">
        <h3 style="margin-bottom:14px">Por Categoria</h3>
        ${TRIP_CATS.map((cat,i)=>{
          const val=expenses.filter(e=>e.category===cat).reduce((s,e)=>s+e.value,0);
          if(!val) return '';
          return `<div style="margin-bottom:12px">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
              <span style="color:var(--text2);font-size:14px">${cat}</span>
              <span style="color:${TRIP_COLORS[i]};font-weight:700">${fmt(val)}</span>
            </div>
            <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${total>0?(val/total)*100:0}%;background:${TRIP_COLORS[i]}"></div></div>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div>
      <div class="panel">
        <div class="panel-header">
          <span>📊</span><h3>Distribuição</h3>
          <div class="chart-toggles">
            <button class="chart-toggle${tripChartType==='pie'?' active':''}" onclick="setTripChart('pie')">Pizza</button>
            <button class="chart-toggle${tripChartType==='bar'?' active':''}" onclick="setTripChart('bar')">Barras</button>
          </div>
        </div>
        <div style="position:relative;height:220px"><canvas id="tripChart"></canvas></div>
      </div>
      <div class="panel" style="max-height:280px;overflow-y:auto">
        <h3 style="margin-bottom:14px">Todos os Gastos</h3>
        ${expenses.length===0?'<p style="color:var(--text4);text-align:center">Nenhum gasto ainda</p>':
          [...expenses].reverse().map(e=>`<div class="item-row" id="trip-exp-${e.id}">
            <div style="flex:1">
              <div style="color:var(--text);font-size:14px">${esc(e.name)}</div>
              <div style="color:var(--text3);font-size:12px">${e.category} · ${e.date}</div>
            </div>
            <span style="color:#a78bfa;font-weight:700;margin-right:4px">${fmt(e.value)}</span>
            <button class="icon-btn" onclick="askDeleteTripExpense('${e.id}','${esc(e.name)}')">🗑️</button>
          </div>`).join('')}

      <button onclick="integrateTrip()" class="btn btn-purple" style="width:100%;padding:16px;font-size:16px;font-weight:700;border-radius:12px">

      </button>

  if(catTotals.length>0){
