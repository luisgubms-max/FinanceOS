    if(tripChartType==='pie'){
      makeChart('tripChart',{type:'pie',data:{labels:catTotals.map(d=>d.name),datasets:[{data:catTotals.map(d=>d.value),backgroundColor:catTotals.map(d=>d.color),borderColor:'#0f172a',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#94a3b8',font:{size:11}}},tooltip:tripTooltip}}});
    }else{
      makeChart('tripChart',{type:'bar',data:{labels:catTotals.map(d=>d.name),datasets:[{data:catTotals.map(d=>d.value),backgroundColor:catTotals.map(d=>d.color),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:tripTooltip},scales:{x:{ticks:{color:'#475569'},grid:{color:'#1e293b'}},y:{ticks:{color:'#475569'},grid:{color:'#1e293b'}}}}});
    }
  }
}

function saveTripName(){
  const val=document.getElementById('trip-name-edit')?.value.trim();
  if(val){ state.trip.name=val; save(); toast('Nome atualizado!'); }
  editingTripName=false; renderTravel();
}
function setTripChart(t){ tripChartType=t; renderTravel(); }
function startTrip(){
  const name=document.getElementById('trip-name-input')?.value.trim();
  if(!name) return;
  state.trip={name,active:true,expenses:[]};
  save(); renderTravel(); toast('Viagem iniciada!');
}
function addTripExpense(){
  const name=document.getElementById('t-desc')?.value.trim();
  const val =parseFloat(document.getElementById('t-val')?.value);
  const date=document.getElementById('t-date')?.value;
  const cat =document.getElementById('t-cat')?.value;
  if(!name||isNaN(val)) return;
  if(!state.trip.expenses) state.trip.expenses=[];
  state.trip.expenses.push({id:uid(),name,value:val,date,category:cat});
  save(); renderTravel(); toast('Gasto adicionado!');
}
function askDeleteTripExpense(id,name){
  const row=document.getElementById('trip-exp-'+id);
  if(!row) return;
  row.outerHTML=`<div class="confirm-row" id="confirm-trip-${id}">
    <span>Excluir <strong>${esc(name)}</strong>?</span>
    <button class="btn-confirm-del" onclick="doDeleteTripExpense('${id}')">Confirmar</button>
    <button class="btn-confirm-cancel" onclick="renderTravel()">Cancelar</button>
  </div>`;
}
function doDeleteTripExpense(id){
  state.trip.expenses=(state.trip.expenses||[]).filter(e=>e.id!==id);
  save(); renderTravel();
}
function integrateTrip(){
  const expenses=state.trip.expenses||[];
  if(!expenses.length){toast('Nenhum gasto para integrar!','#f59e0b');return;}
  const total=expenses.reduce((s,e)=>s+e.value,0);
  const item={id:uid(),name:`Viagem — ${state.trip.name}`,value:total,color:'#8b5cf6',subcategory:'Viagem'};
  const md=getMonthData(state.currentMonth);
  md.variable.push(item);
  state.months[state.currentMonth]=state.months[state.currentMonth]||{};
  state.months[state.currentMonth].variable=md.variable;
  state.trip={name:'',active:false,expenses:[]};
  editingTripName=false;
  save(); currentTab='dashboard'; render(); toast('Viagem integrada às finanças!');
}

// ─── ONBOARDING ───────────────────────────────────────────────────────────────
let obStep=1;
let obData={incomeName:'',incomeValue:'',fixedItems:[],reserves:[]};

function showOnboarding(){
  document.getElementById('onboarding').style.display='flex';
  renderOnboarding();
}
function hideOnboarding(){
  state.onboardingDone=true;
  save();
  document.getElementById('onboarding').style.display='none';
}
function renderOnboarding(){
  const steps=['Sua Renda','Gastos Fixos','Reservas'];
  const stepsHTML=steps.map((s,i)=>`<div class="onboard-step${i<obStep-1?' done':i===obStep-1?' active':''}"></div>`).join('');

  let content='';
  if(obStep===1){
    content=`
      <div class="onboard-title">👋 Bem-vindo ao FinanceOS!</div>
      <div class="onboard-sub">Vamos configurar suas finanças em 3 passos rápidos. Pode pular qualquer etapa.</div>
      <label style="display:block;margin-bottom:6px;font-size:13px;color:var(--text3)">Qual é sua renda mensal principal?</label>
      <input id="ob-income-name" placeholder="Ex: Salário, Freelance..." style="width:100%;margin-bottom:10px" value="${esc(obData.incomeName)}">
      <input id="ob-income-val" type="number" placeholder="Valor (R$)" style="width:100%" value="${obData.incomeValue}">`;
  }else if(obStep===2){
    const items=obData.fixedItems;
    content=`
      <div class="onboard-title">🏠 Seus Gastos Fixos</div>
      <div class="onboard-sub">Adicione seus principais gastos fixos mensais (aluguel, internet, etc.)</div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <input id="ob-fix-name" placeholder="Nome do gasto" style="flex:1">
        <input id="ob-fix-val" type="number" placeholder="R$" style="width:100px">
        <button class="btn btn-green" style="padding:7px 14px;font-size:13px" onclick="obAddFixed()">+ Add</button>
      </div>
      <div id="ob-fixed-list" style="max-height:180px;overflow-y:auto">
        ${items.length===0?'<p style="color:var(--text4);font-size:13px;text-align:center;padding:16px">Nenhum gasto adicionado ainda</p>':
          items.map((it,i)=>`<div class="item-row">
            <div class="item-dot" style="background:#ef4444"></div>
            <span class="item-name">${esc(it.name)}</span>
            <span style="color:#10b981;font-weight:600">${fmt(it.value)}</span>
            <button class="icon-btn" onclick="obData.fixedItems.splice(${i},1);renderOnboarding()">✕</button>
          </div>`).join('')}
      </div>`;
  }else if(obStep===3){
    const items=obData.reserves;
    content=`
      <div class="onboard-title">💎 Reservas & Investimentos</div>
      <div class="onboard-sub">Opcional: defina valores que quer separar todo mês automaticamente.</div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <input id="ob-res-name" placeholder="Ex: Reserva de Emergência" style="flex:1">
        <input id="ob-res-val" type="number" placeholder="R$/mês" style="width:110px">
        <button class="btn btn-green" style="padding:7px 14px;font-size:13px" onclick="obAddReserve()">+ Add</button>
      </div>
      <div id="ob-res-list" style="max-height:160px;overflow-y:auto">
        ${items.length===0?'<p style="color:var(--text4);font-size:13px;text-align:center;padding:16px">Nenhuma reserva (opcional)</p>':
          items.map((it,i)=>`<div class="item-row">
            <span>💎</span>
            <span class="item-name">${esc(it.name)}</span>
            <span style="color:#06b6d4;font-weight:600">${fmt(it.value)}/mês</span>
            <button class="icon-btn" onclick="obData.reserves.splice(${i},1);renderOnboarding()">✕</button>
          </div>`).join('')}
      </div>`;
  }

  document.getElementById('onboarding').innerHTML=`
  <div class="onboard-box">
    <div class="onboard-steps">${stepsHTML}</div>
    ${content}
    <div class="onboard-actions">
      <button class="btn btn-ghost" onclick="hideOnboarding()">Pular configuração</button>
      <div style="display:flex;gap:8px">
        ${obStep>1?`<button class="btn btn-ghost" onclick="obStep--;renderOnboarding()">← Voltar</button>`:''}
        ${obStep<3
          ?`<button class="btn btn-green" onclick="obNext()">Próximo →</button>`
          :`<button class="btn btn-green" onclick="obFinish()">✓ Concluir</button>`}
      </div>
    </div>
  </div>`;
}

function obNext(){
  if(obStep===1){
    obData.incomeName=document.getElementById('ob-income-name')?.value.trim();
    obData.incomeValue=document.getElementById('ob-income-val')?.value;
  }
  obStep++; renderOnboarding();
}
function obAddFixed(){
  const name=document.getElementById('ob-fix-name')?.value.trim();
  const val=parseFloat(document.getElementById('ob-fix-val')?.value);
  if(!name||isNaN(val)) return;
  obData.fixedItems.push({name,value:val});
  renderOnboarding();
}
function obAddReserve(){
  const name=document.getElementById('ob-res-name')?.value.trim();
  const val=parseFloat(document.getElementById('ob-res-val')?.value);
  if(!name||isNaN(val)) return;
  obData.reserves.push({name,value:val});
  renderOnboarding();
}
function obFinish(){
  const m=state.currentMonth;
  if(!state.months[m]) state.months[m]={essentials:[],nonEssentials:[],income:[],variable:[]};

  if(obData.incomeName&&obData.incomeValue){
    state.months[m].income=[{id:uid(),name:obData.incomeName,value:parseFloat(obData.incomeValue),color:'#10b981',subcategory:''}];
  }
  if(obData.fixedItems.length){
    state.months[m].essentials=obData.fixedItems.map(it=>({id:uid(),...it,color:'#ef4444',subcategory:'',recurring:true}));
  }
  if(obData.reserves.length){
    state.reserves=[...state.reserves,...obData.reserves];
  }
  hideOnboarding();
  save(); render(); toast('Configuração concluída! Bem-vindo(a)! 🎉');
}

// ─── CALENDAR ─────────────────────────────────────────────────────────────────
let calViewMonth = state.currentMonth; // 'YYYY-MM'
let calSelectedDay = null;             // 'YYYY-MM-DD'

const MONTH_NAMES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DOW_NAMES   = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

/* ── helpers ── */
function calEventsForDay(d){ return (state.calEvents||{})[d]||[]; }
function calEventsForMonth(ym){
  const evts=[];
  Object.entries(state.calEvents||{}).forEach(([d,arr])=>{ if(d.startsWith(ym)) arr.forEach(e=>evts.push({...e,date:d})); });
  return evts;
}
function calMonthIncome(ym){ return calEventsForMonth(ym).filter(e=>e.type==='income').reduce((s,e)=>s+e.value,0); }
function calMonthExpense(ym){ return calEventsForMonth(ym).filter(e=>e.type!=='income').reduce((s,e)=>s+e.value,0); }
function calOverdueCount(ym){
  const today=new Date().toISOString().slice(0,10);
  return calEventsForMonth(ym).filter(e=>e.type==='bill'&&!e.paid&&e.date<today).length;
}
function calDaysInMonth(ym){ const [y,m]=ym.split('-').map(Number); return new Date(y,m,0).getDate(); }
function calFirstDow(ym){ const [y,m]=ym.split('-').map(Number); return new Date(y,m-1,1).getDay(); }
function calPrevYM(ym){ const [y,m]=ym.split('-').map(Number); const d=new Date(y,m-2,1); return d.toISOString().slice(0,7); }
function calNextYM(ym){ const [y,m]=ym.split('-').map(Number); const d=new Date(y,m,1); return d.toISOString().slice(0,7); }
function dayLabel(ym,d){ return `${ym}-${String(d).padStart(2,'0')}`; }
function daysUntil(dateStr){ const diff=new Date(dateStr+'T00:00:00')-new Date(new Date().toDateString()); return Math.round(diff/86400000); }

function saveCalEvent(dateStr,event){
  if(!state.calEvents) state.calEvents={};
  if(!state.calEvents[dateStr]) state.calEvents[dateStr]=[];
  const idx=state.calEvents[dateStr].findIndex(e=>e.id===event.id);
  if(idx>=0) state.calEvents[dateStr][idx]=event;
  else state.calEvents[dateStr].push(event);
  save();
}
function deleteCalEvent(dateStr,id){
  if(!state.calEvents?.[dateStr]) return;
  state.calEvents[dateStr]=state.calEvents[dateStr].filter(e=>e.id!==id);
  if(!state.calEvents[dateStr].length) delete state.calEvents[dateStr];
  save();
}
function toggleCalPaid(dateStr,id){
  const ev=(state.calEvents?.[dateStr]||[]).find(e=>e.id===id);
  if(ev){ ev.paid=!ev.paid; save(); renderCalendar(); }
}

/* ── send cal expense to dashboard ── */
function sendCalToDashboard(dateStr,id){
  const ev=(state.calEvents?.[dateStr]||[]).find(e=>e.id===id);
  if(!ev) return;
  const ym=dateStr.slice(0,7);
  if(!state.months[ym]) state.months[ym]={essentials:[],nonEssentials:[],income:[],variable:[]};
  const cat=ev.type==='income'?'income':'variable';
  state.months[ym][cat]=state.months[ym][cat]||[];
  state.months[ym][cat].push({id:uid(),name:ev.name,value:ev.value,color:ev.color||'#6366f1',subcategory:ev.category||''});
  ev.paid=true;
  save(); renderCalendar(); toast('Lançado no Dashboard!');
}

/* ── main render ── */
function renderCalendar(){
  const ym   = calViewMonth;
  const [y,m]= ym.split('-').map(Number);
  const today = new Date().toISOString().slice(0,10);
  const daysInMonth = calDaysInMonth(ym);
  const firstDow    = calFirstDow(ym);
  const prevYM      = calPrevYM(ym);
  const prevDays    = calDaysInMonth(prevYM);

  // summary stats
  const allEvts     = calEventsForMonth(ym);
  const totalIn     = allEvts.filter(e=>e.type==='income').reduce((s,e)=>s+e.value,0);
  const totalOut    = allEvts.filter(e=>e.type!=='income').reduce((s,e)=>s+e.value,0);
  const totalBills  = allEvts.filter(e=>e.type==='bill');
  const paidBills   = totalBills.filter(e=>e.paid).reduce((s,e)=>s+e.value,0);
  const pendBills   = totalBills.filter(e=>!e.paid).reduce((s,e)=>s+e.value,0);
  const overdue     = totalBills.filter(e=>!e.paid&&e.date<today);

  // build day cells
  let cells=[];
  // prev month padding
  for(let i=firstDow-1;i>=0;i--){
    const d=prevDays-i;
    cells.push({day:d,ym:prevYM,other:true});
  }
  // current month
  for(let d=1;d<=daysInMonth;d++) cells.push({day:d,ym,other:false});
  // next month padding
  const remaining=(7-cells.length%7)%7;
  for(let d=1;d<=remaining;d++) cells.push({day:d,ym:calNextYM(ym),other:true});

  const cellsHTML = cells.map(({day,ym:cym,other})=>{
    const dateStr = dayLabel(cym,day);
    const isToday = dateStr===today;
    const isSel   = dateStr===calSelectedDay;
    const dow     = new Date(dateStr+'T00:00:00').getDay();
    const isWE    = dow===0||dow===6;
    const evts    = calEventsForDay(dateStr);
    const overD   = evts.some(e=>e.type==='bill'&&!e.paid&&dateStr<today);
    // day totals
    const dayIn   = evts.filter(e=>e.type==='income').reduce((s,e)=>s+e.value,0);
    const dayOut  = evts.filter(e=>e.type!=='income').reduce((s,e)=>s+e.value,0);
    const MAX_SHOW=3;
    const shown=evts.slice(0,MAX_SHOW);
    const extra=evts.length-MAX_SHOW;
    const evtHTML=shown.map(e=>`<div class="cal-event ${e.type}" title="${esc(e.name)}: ${fmt(e.value)}">${e.paid?'✓ ':''}&nbsp;${esc(e.name)}</div>`).join('');
    const moreHTML=extra>0?`<div class="cal-event more">+${extra} mais</div>`:'';
    const totalHTML=(dayIn||dayOut)?`<div class="cal-day-total" style="color:${dayIn>dayOut?'#10b981':dayOut>0?'#ef4444':'var(--text3)'}">
      ${dayIn>0?`<span style="color:#10b981">+${(dayIn/1000).toFixed(dayIn>=1000?1:0)}k</span> `:''}
      ${dayOut>0?`<span style="color:#ef4444">-${(dayOut/1000).toFixed(dayOut>=1000?1:0)}k</span>`:''}
    </div>`:'';
    return `<div class="cal-cell${isToday?' today':''}${isSel?' selected':''}${other?' other-month':''}${isWE?' weekend-day':''}${overD?' has-overdue':''}"
      onclick="calSelectDay('${dateStr}')">
      <div class="cal-day-num">${day}</div>
      ${evtHTML}${moreHTML}${totalHTML}
    </div>`;
  }).join('');

  // upcoming bills (next 14 days)
  const upcoming=[];
  for(let i=0;i<14;i++){
    const d=new Date(); d.setDate(d.getDate()+i);
    const ds=d.toISOString().slice(0,10);
    calEventsForDay(ds).filter(e=>e.type==='bill'&&!e.paid).forEach(e=>upcoming.push({...e,date:ds,daysLeft:i}));
  }
  const upcomingHTML=upcoming.length===0?`<p style="color:var(--text4);font-size:13px;text-align:center;padding:16px">Nenhuma conta nos próximos 14 dias 🎉</p>`:
    upcoming.map(e=>`<div class="upcoming-item">
      <div class="upcoming-date ${e.daysLeft===0?'today-due':e.daysLeft<=3?'soon':'ok'}">
        <span style="font-size:13px;font-weight:800">${e.daysLeft===0?'HOJE':e.daysLeft}</span>
        ${e.daysLeft>0?`<span>dias</span>`:''}
      </div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;color:var(--text)">${esc(e.name)}</div>
        <div style="font-size:11px;color:var(--text3)">${e.date} · ${e.category||'Conta'}</div>
      </div>
      <span style="color:#f87171;font-weight:700;font-size:13px">${fmt(e.value)}</span>
      <button class="icon-btn" title="Marcar como pago" onclick="toggleCalPaid('${e.date}','${e.id}');renderCalendar()" style="color:#10b981">✓</button>
    </div>`).join('');

  // selected day panel
  const selEvts = calSelectedDay ? calEventsForDay(calSelectedDay) : [];
  const selDate = calSelectedDay ? new Date(calSelectedDay+'T00:00:00') : null;
  const selLabel = selDate ? `${selDate.getDate()} de ${MONTH_NAMES[selDate.getMonth()]} de ${selDate.getFullYear()}` : 'Selecione um dia';
  const selIn  = selEvts.filter(e=>e.type==='income').reduce((s,e)=>s+e.value,0);
  const selOut = selEvts.filter(e=>e.type!=='income').reduce((s,e)=>s+e.value,0);

  const selEvtsHTML = selEvts.length===0
    ? `<p style="color:var(--text4);font-size:13px;text-align:center;padding:12px 0">Nenhum lançamento</p>`
    : selEvts.map(e=>{
        const typeLabel={income:'Receita',expense:'Gasto',bill:'Conta',reminder:'Lembrete'}[e.type]||e.type;
        const typeColor={income:'#10b981',expense:'#ef4444',bill:'#f87171',reminder:'#fcd34d'}[e.type]||'#94a3b8';
        return `<div class="day-event-row" id="cal-ev-${e.id}">
          <div class="day-event-dot" style="background:${e.color||typeColor}"></div>
          <div style="flex:1">
            <div class="day-event-name">${esc(e.name)}</div>
            <div style="font-size:11px;color:var(--text3)">${typeLabel}${e.category?' · '+esc(e.category):''}${e.paid?' · <span style="color:#10b981">Pago ✓</span>':''}</div>
            ${e.note?`<div style="font-size:11px;color:var(--text4);margin-top:2px">${esc(e.note)}</div>`:''}
          </div>
          <div style="text-align:right">
            <div class="day-event-val" style="color:${e.type==='income'?'#10b981':'#f87171'}">${e.type==='income'?'+':'-'}${fmt(e.value)}</div>
            <div style="display:flex;gap:4px;margin-top:4px;justify-content:flex-end">
              ${e.type==='bill'?`<button class="icon-btn" title="${e.paid?'Desmarcar':'Marcar pago'}" onclick="toggleCalPaid('${calSelectedDay}','${e.id}')" style="font-size:12px;color:#10b981">${e.paid?'↩️':'✓'}</button>`:''}
              <button class="icon-btn" title="Lançar no Dashboard" onclick="sendCalToDashboard('${calSelectedDay}','${e.id}')" style="font-size:12px">📊</button>
              <button class="icon-btn" onclick="askDeleteCalEvent('${calSelectedDay}','${e.id}','${esc(e.name)}')" style="font-size:12px">🗑️</button>
            </div>
          </div>
        </div>`;
      }).join('');

  const addFormHTML_cal = calSelectedDay ? `
    <div class="cal-add-form" id="cal-add-form" style="display:none">
      <h4>+ Novo lançamento em ${calSelectedDay}</h4>
      <div class="cal-add-row">
        <input id="cal-ev-name" placeholder="Nome (ex: Aluguel, Salário...)">
        <div style="display:flex;gap:8px">
          <input id="cal-ev-val" type="number" placeholder="Valor (R$)" style="flex:1">
          <input type="color" id="cal-ev-color" value="#10b981" style="width:36px">
        </div>
        <select id="cal-ev-type">
          <option value="bill">🔴 Conta / Vencimento</option>
          <option value="expense">🟠 Gasto</option>
          <option value="income">🟢 Receita</option>
          <option value="reminder">🟡 Lembrete</option>
        </select>
        <input id="cal-ev-cat" placeholder="Categoria (opcional)">
        <input id="cal-ev-note" placeholder="Observação (opcional)">
        <button class="btn btn-green" style="width:100%;padding:9px" onclick="addCalEvent()">Adicionar</button>
      </div>
    </div>` : '';

  document.getElementById('main').innerHTML=`
  <div class="page-header"><h1>📅 Calendário Financeiro</h1><p>Vencimentos, receitas e gastos por dia</p></div>

  <div class="cal-summary">
    <div class="cal-summary-card">
      <div class="csl">Receitas do mês</div>
      <div class="csv" style="color:#10b981">+${fmt(totalIn)}</div>
    </div>
    <div class="cal-summary-card">
      <div class="csl">Gastos do mês</div>
      <div class="csv" style="color:#ef4444">-${fmt(totalOut)}</div>
    </div>
    <div class="cal-summary-card">
      <div class="csl">Contas pagas</div>
      <div class="csv" style="color:#06b6d4">${fmt(paidBills)}</div>
    </div>
    <div class="cal-summary-card">
      <div class="csl">Contas pendentes</div>
      <div class="csv" style="color:${pendBills>0?'#f59e0b':'#10b981'}">${fmt(pendBills)}${overdue.length>0?` <span style="font-size:12px;color:#ef4444">(${overdue.length} atrasada${overdue.length>1?'s':''})</span>`:''}</div>
    </div>
  </div>

  <div class="cal-wrap">
    <div>
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="calViewMonth=calPrevYM(calViewMonth);calSelectedDay=null;renderCalendar()">← </button>
        <h2>${MONTH_NAMES[m-1]} ${y}</h2>
        <button class="cal-nav-btn" onclick="calViewMonth=calNextYM(calViewMonth);calSelectedDay=null;renderCalendar()"> →</button>
      </div>
      <div class="cal-grid">
        ${DOW_NAMES.map((d,i)=>`<div class="cal-dow${i===0||i===6?' weekend':''}">${d}</div>`).join('')}
        ${cellsHTML}
      </div>
      <div style="display:flex;gap:12px;margin-top:14px;flex-wrap:wrap">
        <span style="font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:rgba(16,185,129,.18)"></span>Receita</span>
        <span style="font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:rgba(239,68,68,.25)"></span>Conta/Vencimento</span>
        <span style="font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:rgba(239,68,68,.15)"></span>Gasto</span>
        <span style="font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:rgba(245,158,11,.15)"></span>Lembrete</span>
        <span style="font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px"><span style="display:inline-block;width:10px;height:10px;border:1px solid rgba(239,68,68,.5);border-radius:2px"></span>Atrasado</span>
      </div>
    </div>

    <div>
      <div class="day-detail">
        <div class="day-detail-header">${selLabel}</div>
        ${calSelectedDay?`
        <div style="display:flex;gap:12px;margin-bottom:12px">
          ${selIn>0?`<span style="font-size:12px;color:#10b981;font-weight:700">+${fmt(selIn)}</span>`:''}
          ${selOut>0?`<span style="font-size:12px;color:#ef4444;font-weight:700">-${fmt(selOut)}</span>`:''}
        </div>
        `:'<div class="day-detail-sub">Clique em qualquer dia para ver ou adicionar lançamentos</div>'}
        <div id="sel-events">${selEvtsHTML}</div>
        ${calSelectedDay?`
        <button class="btn btn-green" style="width:100%;margin-top:12px;font-size:13px;padding:8px" onclick="toggleCalAddForm()">+ Adicionar lançamento</button>
        ${addFormHTML_cal}
        `:''}
      </div>

      <div class="panel" style="margin-top:16px">
        <div class="panel-header"><span>⏰</span><h3>Próximos vencimentos</h3><span style="font-size:12px;color:var(--text3);margin-left:auto">14 dias</span></div>
        ${upcomingHTML}
      </div>
    </div>
  </div>`;
}

function calSelectDay(dateStr){
  calSelectedDay = calSelectedDay===dateStr ? null : dateStr;
  renderCalendar();
}

function toggleCalAddForm(){
  const f=document.getElementById('cal-add-form');
  if(f) f.style.display=f.style.display==='none'?'block':'none';
}

function addCalEvent(){
  const name  = document.getElementById('cal-ev-name')?.value.trim();
  const val   = parseFloat(document.getElementById('cal-ev-val')?.value);
  const type  = document.getElementById('cal-ev-type')?.value;
  const cat   = document.getElementById('cal-ev-cat')?.value.trim();
  const note  = document.getElementById('cal-ev-note')?.value.trim();
  const color = document.getElementById('cal-ev-color')?.value||'#10b981';
  if(!name||isNaN(val)||!calSelectedDay) return;
  const ev={id:uid(),name,value:val,type,category:cat,note,color,paid:false};
  saveCalEvent(calSelectedDay,ev);
  renderCalendar();
  toast('Lançamento adicionado!');
}

function askDeleteCalEvent(dateStr,id,name){
  const row=document.getElementById('cal-ev-'+id);
  if(!row) return;
  row.outerHTML=`<div class="confirm-row" id="confirm-cal-${id}" style="border-radius:8px;padding:8px 10px">
    <span>Excluir <strong>${esc(name)}</strong>?</span>
    <button class="btn-confirm-del" onclick="deleteCalEvent('${dateStr}','${id}');renderCalendar()">Confirmar</button>
    <button class="btn-confirm-cancel" onclick="renderCalendar()">Cancelar</button>
  </div>`;
}

let userMenuOpen = false;

function showAuthError(msg){
  const el=document.getElementById('auth-error');
  if(el){ el.textContent=msg; el.style.display='block'; }
  const s=document.getElementById('auth-success');
  if(s) s.style.display='none';
}
function showAuthSuccess(msg){
  const el=document.getElementById('auth-success');
  if(el){ el.textContent=msg; el.style.display='block'; }
  const e=document.getElementById('auth-error');
  if(e) e.style.display='none';
}
function setAuthLoading(loading){
  const btn=document.getElementById('auth-submit-btn');
  if(btn){ btn.disabled=loading; btn.textContent=loading?'Aguarde...':{login:'Entrar',signup:'Criar conta',reset:'Enviar link'}[authMode]; }
}

async function authSubmit(){
  if(!sb){ showAuthError('Supabase não configurado. Use o modo offline.'); return; }
  const email = document.getElementById('auth-email')?.value.trim();
  const pass  = document.getElementById('auth-pass')?.value;
  const name  = document.getElementById('auth-name')?.value.trim();
  if(!email){ showAuthError('Informe seu e-mail.'); return; }
  setAuthLoading(true);
  try{
    if(authMode==='login'){
      const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
      if(error) throw error;
      await onSignIn(data.user);
    } else if(authMode==='signup'){
      if(!pass||pass.length<6){ showAuthError('Senha deve ter pelo menos 6 caracteres.'); setAuthLoading(false); return; }
      const { data, error } = await sb.auth.signUp({ email, password: pass, options:{ data:{ full_name: name } } });
      if(error) throw error;
      if(data.user && !data.user.identities?.length){
        showAuthError('Este e-mail já está cadastrado. Faça login.');
      } else if(data.user){
        showAuthSuccess('Conta criada! Verifique seu e-mail para confirmar (pode estar no spam). Após confirmar, faça login.');
        authMode='login'; setTimeout(()=>renderAuth(), 3000);
      }
    } else if(authMode==='reset'){
      const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.href });
      if(error) throw error;
      showAuthSuccess('Link enviado! Verifique seu e-mail.');
    }
  }catch(e){
    const msgs = {
      'Invalid login credentials':'E-mail ou senha incorretos.',
      'Email not confirmed':'Confirme seu e-mail antes de entrar.',
      'User already registered':'Este e-mail já está cadastrado.',
    };
    showAuthError(msgs[e.message] || e.message);
  }
  setAuthLoading(false);
}

async function onSignIn(user){
  currentUser = user;
  hideAuthScreen();
  document.getElementById('user-menu-wrap').style.display='flex';
  const initials = (user.user_metadata?.full_name||user.email||'?').charAt(0).toUpperCase();
  document.getElementById('user-avatar').textContent = initials;
  document.getElementById('user-email-short').textContent = user.email.split('@')[0];
  document.getElementById('user-menu-email').textContent = user.email;
  // Try to load cloud data; fall back to localStorage
  const loaded = await loadFromCloud();
  if(!loaded){
    // First time: push localStorage data to cloud
    await syncToCloud();
  }
  calViewMonth = state.currentMonth;
  render();
  if(!state.onboardingDone) showOnboarding();
  setSyncStatus('synced');
}

function continueOffline(){
  hideAuthScreen();
  render();
  if(!state.onboardingDone) showOnboarding();
  toast('Modo offline ativo — dados salvos localmente', '#64748b');
}

function toggleUserMenu(){
  userMenuOpen=!userMenuOpen;
  const m=document.getElementById('user-menu');
  if(m) m.style.display=userMenuOpen?'block':'none';
}
document.addEventListener('click',e=>{
  if(!e.target.closest('#user-menu-wrap')){ userMenuOpen=false; const m=document.getElementById('user-menu'); if(m) m.style.display='none'; }
});

async function signOut(){
  if(sb) await sb.auth.signOut();
  currentUser=null;
  document.getElementById('user-menu-wrap').style.display='none';
  showAuthScreen();
  toast('Até logo!','#64748b');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init(){
  initSupabase();

  if(OFFLINE_MODE){
    // No Supabase configured — run fully offline
    render();
    if(!state.onboardingDone) showOnboarding();
    return;
  }

  // Move user badge into nav (right side)
  const nav = document.getElementById('nav');
  const wrap = document.getElementById('user-menu-wrap');
  if(nav && wrap) nav.appendChild(wrap);

  // Check if already have a session
  showAuthScreen();
  try{
    const { data: { session } } = await sb.auth.getSession();
    if(session?.user){
      await onSignIn(session.user);
    }
    // Listen for auth changes (e.g. magic link, password reset)
    sb.auth.onAuthStateChange(async (event, session)=>{
      if(event==='SIGNED_IN' && session?.user && !currentUser){
        await onSignIn(session.user);
      } else if(event==='SIGNED_OUT'){
        currentUser=null;
        showAuthScreen();
      }
    });
  }catch(e){
    console.warn('Session check failed:', e);
    continueOffline();
  }
}

init();
</script>
